<script>
const sb = supabase.createClient(
  "https://gwvqttdjevogjvldzspf.supabase.co",
  "sb_publishable_e1x6gdl3QHjwdKa5UIjYxQ_eMkUaTad"
);

// ── SESIÓN ────────────────────────────────────────────
const SS = {
  unidadId: localStorage.getItem("part_unidad_id"),
  codigo:   localStorage.getItem("part_codigo"),
  nombre:   localStorage.getItem("part_nombre"),
  evId:     localStorage.getItem("part_ev_id"),
  orgId:    localStorage.getItem("part_org_id"),
};
const EV_ID  = SS.evId;
const ORG_ID = SS.orgId;

let evData      = null;
let preguntas   = [];
let preguntasCerradas = [];  // historial de cerradas
let misVotos    = {};
let unidadInfo  = null;
let statsGlobal = { totalPart:0, totalVotaron:0, coefVotado:0 };
let pollingInt  = null;  // intervalo de polling

// ── CERRAR SESIÓN ────────────────────────────────────────
function cerrarSesion() {
  if (!confirm("¿Seguro que quieres cerrar sesión?")) return;
  // Limpiar sesión guardada
  ["part_unidad_id","part_codigo","part_nombre","part_ev_id","part_org_id"]
    .forEach(k => localStorage.removeItem(k));
  // Marcar participante como inactivo
  pingSession(true);
  // Ir al login
  location.replace(`Login_Participante.html?ev=${EV_ID||""}&org=${ORG_ID||""}`);
}
// ── INIT ──────────────────────────────────────────────
async function init() {
  if (!SS.unidadId || !EV_ID) {
    location.href = `Login_Participante.html?ev=${EV_ID||""}&org=${ORG_ID||""}`;
    return;
  }
  document.getElementById("nav-nombre").textContent = SS.nombre || "Participante";
  document.getElementById("nav-unidad").textContent = "Unidad " + (SS.codigo || "—");

  try {
    await Promise.all([cargarEvento(), cargarMisVotos(), cargarUnidadInfo()]);
    iniciarPolling();
    iniciarHeartbeat();
  } catch(e) {
    mostrarError("Error al cargar el portal. Recarga la página.");
  }
}

function mostrarError(msg) {
  document.getElementById("main").innerHTML = `
    <div style="text-align:center;padding:60px 20px;">
      <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
      <div style="font-size:16px;font-weight:700;color:#f87171;margin-bottom:8px;">${msg}</div>
      <button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;">🔄 Reintentar</button>
    </div>`;
}

// ── POLLING INTELIGENTE ───────────────────────────────
// Cada 6s revisa: config del evento, estado de preguntas, stats y gráficas
// Aplica cambios quirúrgicamente sin reconstruir el DOM
// ── HEARTBEAT — mantiene la sesión activa ────────────
// Actualiza session_ping cada 30s en Supabase
// Si el browser se cierra, el ping se detiene → otra sesión puede entrar tras 90s
let _heartbeatInt = null;
function iniciarHeartbeat() {
  // Ping inmediato al entrar
  pingSession();
  // Luego cada 30s
  _heartbeatInt = setInterval(pingSession, 30000);
  // Al cerrar/salir: intentar marcar sesión como inactiva
  window.addEventListener("beforeunload", () => {
    // Usar sendBeacon para garantizar que se envíe aunque el browser esté cerrando
    // Como Supabase no soporta sendBeacon directamente, actualizamos sync
    pingSession(true);
  });
  // En móvil, pagehide es más confiable que beforeunload
  window.addEventListener("pagehide", () => {
    pingSession(true);
  });
}

async function pingSession(esLimpieza = false) {
  if (!SS.unidadId || !EV_ID) return;
  try {
    await sb.from("participantes").update({
      session_ping: esLimpieza ? null : new Date().toISOString()
    })
    .eq("id_evento", EV_ID)
    .eq("id_unidad", SS.unidadId);
  } catch(e) {
    // Silencioso — no interrumpir la UX si falla el ping
  }
}

let _pollingBusy = false;
function iniciarPolling() {
  if (pollingInt) clearInterval(pollingInt);
  pollingInt = setInterval(async () => {
    if (document.hidden || _pollingBusy) return;
    _pollingBusy = true;
    try {
      // Secuencial: evento primero, luego preguntas, luego stats
      // Así evitamos que pollPreguntas modifique DOM mientras pollEvento lo lee
      await pollEvento();
      await pollPreguntas();
      await cargarStatsParticipacion();
      actualizarStatsInPlace();
      if (!evData?.ocultar_graficos) {
        for (const pregId of Object.keys(portalCharts)) {
          await cargarYActualizarGrafica(pregId);
        }
      }
    } catch(e) {
      console.warn("Poll error:", e);
    } finally {
      _pollingBusy = false;
    }
  }, 6000);
}

// ── POLL EVENTO — detecta cambios de config ───────────
async function pollEvento() {
  // Verificar si el participante sigue registrado — si lo quitaron, cerrar sesión
  const { data: partCheck } = await sb.from("participantes")
    .select("estado,activo")
    .eq("id_evento", EV_ID)
    .eq("id_unidad", SS.unidadId)
    .maybeSingle();
  if (!partCheck || partCheck.estado !== "Registrado") {
    // Lo sacaron del registro — limpiar sesión y redirigir
    ["part_unidad_id","part_codigo","part_nombre","part_ev_id","part_org_id"]
      .forEach(k => localStorage.removeItem(k));
    clearInterval(pollingInt);
    clearInterval(_heartbeatInt);
    alert("Tu registro fue removido por la administración. Serás redirigido al inicio.");
    location.replace("Login_Participante.html?ev=" + (EV_ID||"") + "&org=" + (ORG_ID||""));
    return;
  }

  const { data } = await sb.from("eventos")
    .select("id,nombre,estado,tipo,ocultar_graficos,permitir_voto_mora,permitir_cambiar_respuestas,fecha,quorum_minimo")
    .eq("id", EV_ID).single();
  if (!data || !evData) return;

  const cambios = [];
  // Usar !! para comparar booleanos — Supabase puede devolver true/1/"true"
  if (!!data.ocultar_graficos           !== !!evData.ocultar_graficos)           cambios.push("graficos");
  if (!!data.permitir_cambiar_respuestas !== !!evData.permitir_cambiar_respuestas) cambios.push("cambiar");
  if (data.estado                       !== evData.estado)                        cambios.push("estado");
  if (!!data.permitir_voto_mora         !== !!evData.permitir_voto_mora)          cambios.push("mora");
  if (String(data.quorum_minimo||"")    !== String(evData.quorum_minimo||""))     cambios.push("quorum");

  if (!cambios.length) return; // sin cambios, no hacer nada

  evData = data; // actualizar estado global

  // Aplicar cada cambio quirúrgicamente
  if (cambios.includes("estado")) {
    // Estado del evento cambió → necesita re-render completo
    await cargarPreguntas();
    return;
  }
  if (cambios.includes("cambiar")) {
    // Botón cambiar respuesta: mostrar/ocultar en cada pregunta
    aplicarCambiarRespuestas(data.permitir_cambiar_respuestas);
  }
  if (cambios.includes("graficos")) {
    // Gráficas: mostrar u ocultar
    aplicarOcultarGraficos(data.ocultar_graficos);
  }
  if (cambios.includes("mora")) {
    // Si cambia la política de mora y la unidad está en mora → re-render
    if (unidadInfo?.en_mora) await cargarPreguntas();
  }
  if (cambios.includes("quorum")) {
    actualizarStatsInPlace();
  }
}

// Mostrar/ocultar botón "Cambiar respuesta" en cada pregunta ya votada
function aplicarCambiarRespuestas(permitir) {
  preguntas.forEach(p => {
    const voto = misVotos[p.id];
    if (!voto) return;
    const body  = document.getElementById(`preg-body-${p.id}`);
    if (!body) return;
    const btn   = document.getElementById(`btnv-${p.id}`);
    const ops   = document.getElementById(`ops-${p.id}`);
    const badge = document.getElementById(`vbadge-${p.id}`);

    if (permitir) {
      // Si las ops no existen en el DOM → el card fue renderizado en modo "solo badge"
      // Hay que reconstruir el body completo para incluir opciones + botón cambiar
      if (!ops) {
        const pregData = preguntas.find(x => x.id === p.id);
        if (!pregData) return;
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = renderPregunta(pregData, preguntas.indexOf(pregData), voto, Array.isArray(pregData.opciones)?pregData.opciones:[]);
        const nuevoBody = tempDiv.firstElementChild?.querySelector(`#preg-body-${p.id}`);
        if (nuevoBody) body.innerHTML = nuevoBody.innerHTML;
        // Cargar gráfica si corresponde
        if (!evData?.ocultar_graficos) {
          const resEl = document.getElementById(`res-${p.id}`);
          if (resEl && !portalCharts[p.id]) cargarYActualizarGrafica(p.id);
        }
        return;
      }
      // ops existe → solo mostrar
      ops.style.display = "";
      if (btn) { btn.style.display = ""; btn.disabled = true; }
      if (badge) {
        badge.style.cssText = "background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d;display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:12px;border:1px solid;margin-bottom:12px;font-size:14px;font-weight:600;";
        badge.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Votaste: <strong id="vtexto-${p.id}">${voto}</strong> — <span style="opacity:.7;font-size:12px;">puedes cambiar</span>`;
      }
    } else {
      // Ocultar opciones y botón
      if (ops) ops.style.display = "none";
      if (btn) btn.style.display = "none";
      if (badge) {
        badge.style.cssText = "";
        badge.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Tu voto: <strong id="vtexto-${p.id}">${voto}</strong>`;
      }
    }
  });
}

// Mostrar u ocultar gráficas sin reconstruir las preguntas
function aplicarOcultarGraficos(ocultar) {
  preguntas.forEach(p => {
    if (ocultar) {
      // Ocultar: destruir chart y esconder contenedor
      if (portalCharts[p.id]) { portalCharts[p.id].destroy(); delete portalCharts[p.id]; }
      delete portalChartCache[p.id];
      const resEl = document.getElementById(`rescard-${p.id}`) || document.getElementById(`res-${p.id}`);
      if (resEl) resEl.style.display = "none";
    } else {
      // Mostrar: solo aplica si el usuario ya votó esta pregunta
      if (!misVotos[p.id]) return;
      // Asegurar que el div contenedor exista
      let resEl = document.getElementById(`rescard-${p.id}`) || document.getElementById(`res-${p.id}`);
      if (!resEl) {
        const body = document.getElementById(`preg-body-${p.id}`);
        if (!body) return;
        resEl = document.createElement("div");
        resEl.id = `res-${p.id}`;
        resEl.style.marginTop = "12px";
        body.appendChild(resEl);
      }
      resEl.style.display = "";
      resEl.innerHTML = ""; // limpiar por si tiene contenido viejo
      // Pequeño delay para que el DOM esté estable antes de dibujar el canvas
      setTimeout(() => cargarYActualizarGrafica(p.id), 50);
    }
  });
}

// ── POLL PREGUNTAS ───────────────────────────────────
// Maneja 3 estados: Activa, Cerrada, Inactiva
// • Activa   → visible con opciones de voto
// • Cerrada  → historial compacto (sin gráfica, sin opciones)
// • Inactiva → invisible completamente (no existe para el usuario)
async function pollPreguntas() {
  const { data } = await sb.from("preguntas")
    .select("id,titulo,estado,opciones,orden,descripcion")
    .eq("id_evento", EV_ID)
    .order("orden");
  if (!data) return;

  const activas   = data.filter(p => p.estado === "Activa");
  const cerradas  = data.filter(p => p.estado === "Cerrada");
  // Inactivas = ni Activa ni Cerrada (estado Inactiva u otro)

  // Comparar con estado actual
  const actualesIds = preguntas.map(p => p.id).sort().join(",");
  const nuevasIds   = activas.map(p => p.id).sort().join(",");

  // También detectar preguntas que cambiaron de Cerrada a Activa (re-apertura)
  const reabiertas = activas.filter(a => {
    const enCard = document.getElementById(`preg-${a.id}`);
    // Caso 1: existe en DOM pero en modo historial cerrado
    if (enCard && enCard.dataset.estado === "cerrada") return true;
    // Caso 2: no existe en DOM pero ya estuvo activa antes (tenía voto o estaba en preguntas previas)
    // → lo maneja "nuevasCards" más abajo, no aquí
    return false;
  });

  // Sin ningún cambio → salir
  const cerradasIds = cerradas.map(p=>p.id).sort().join(",");
  const prevCerradasIds = (window._prevCerradasIds || "");
  const sinCambios = actualesIds === nuevasIds && cerradasIds === prevCerradasIds;
  window._prevCerradasIds = cerradasIds;
  if (sinCambios && !reabiertas.length) return;

  // ── Preguntas que se volvieron Inactivas: quitar del DOM completamente
  // Buscar en el DOM todos los cards actuales (activas + cerradas que estaban antes)
  // Una pregunta se inactiva si ya no aparece ni en activas ni en cerradas
  const todasEnDOM = Array.from(document.querySelectorAll(".pregunta-card"))
    .map(el => el.id.replace("preg-",""));
  const inactivadas = todasEnDOM.filter(domId =>
    !activas.find(a => String(a.id) === domId) &&
    !cerradas.find(c => String(c.id) === domId)
  );
  inactivadas.forEach(domId => {
    // Destruir chart
    if (portalCharts[domId]) { portalCharts[domId].destroy(); delete portalCharts[domId]; }
    delete portalChartCache[domId];
    // NO borrar misVotos — si se reactiva necesitamos saber si ya votó
    // Quitar card del DOM
    const card = document.getElementById(`preg-${domId}`);
    if (card) card.remove();
    // Si no quedan cards activos → mostrar "esperando"
    const main = document.getElementById("main");
    const tieneCards = main && main.querySelector(".pregunta-card");
    if (!tieneCards && activas.length === 0) {
      const esperandoExiste = main && main.querySelector(".esperando");
      if (!esperandoExiste && main) {
        const div = document.createElement("div");
        div.id = "esp-wrap";
        div.innerHTML = renderEsperando("⏳","Esperando preguntas","El administrador activará las preguntas pronto.");
        main.appendChild(div);
      }
    }
  });

  // ── Preguntas Cerradas: colapsar a historial compacto
  const recienCerradas = cerradas.filter(c => {
    const card = document.getElementById(`preg-${c.id}`);
    return card && card.dataset.estado !== "cerrada"; // ya procesadas no retocar
  });
  recienCerradas.forEach(p => {
    const card = document.getElementById(`preg-${p.id}`);
    if (!card) return;
    card.dataset.estado = "cerrada";
    // Destruir chart
    if (portalCharts[p.id]) { portalCharts[p.id].destroy(); delete portalCharts[p.id]; }
    delete portalChartCache[p.id];
    const miVoto = misVotos[p.id];
    const body = document.getElementById(`preg-body-${p.id}`);
    if (body) {
      body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:28px;height:28px;border-radius:8px;background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="13" height="13" fill="none" stroke="#f87171" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <span style="font-size:12px;font-weight:700;color:#f87171;">Cerrada</span>
          </div>
          ${miVoto
            ? `<div style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);">
                <svg width="12" height="12" fill="none" stroke="#4ade80" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                <span style="font-size:12px;font-weight:700;color:#4ade80;">Tu voto: ${miVoto}</span>
               </div>`
            : `<span style="font-size:12px;color:var(--muted);font-style:italic;">Sin voto registrado</span>`
          }
        </div>`;
    }
    card.style.marginBottom = "8px";
    const head = card.querySelector(".preg-head");
    if (head) head.style.paddingBottom = "10px";
  });

  // ── Preguntas Re-abiertas (Cerrada/Inactiva → Activa): restaurar UI completa
  reabiertas.forEach(async p => {
    const pregData = activas.find(a => a.id === p.id);
    if (!pregData) return;
    const card = document.getElementById(`preg-${p.id}`);
    if (!card) return;

    // Re-sincronizar voto desde BD (por si cambió mientras estaba inactiva/cerrada)
    const { data: votoFresh } = await sb.from("votos")
      .select("respuesta").eq("id_pregunta", p.id).eq("id_unidad", SS.unidadId).maybeSingle();
    if (votoFresh) misVotos[p.id] = votoFresh.respuesta;
    else delete misVotos[p.id];

    card.dataset.estado = "activa";
    card.style.marginBottom = "16px";
    const head = card.querySelector(".preg-head");
    if (head) head.style.paddingBottom = "";
    const body = document.getElementById(`preg-body-${p.id}`);
    if (body) {
      const tempDiv = document.createElement("div");
      tempDiv.innerHTML = renderPregunta(pregData, activas.indexOf(pregData), misVotos[p.id], Array.isArray(pregData.opciones)?pregData.opciones:[]);
      const nuevoBody = tempDiv.firstElementChild?.querySelector(`#preg-body-${p.id}`);
      if (nuevoBody) body.innerHTML = nuevoBody.innerHTML;
    }
    if (!evData?.ocultar_graficos && misVotos[p.id]) {
      setTimeout(() => cargarYActualizarGrafica(p.id), 80);
    }
  });

  // ── Preguntas Nuevas (Activa por primera vez): insertar en DOM
  const nuevasCards = activas.filter(a => !document.getElementById(`preg-${a.id}`));
  if (nuevasCards.length) {
    // Quitar cualquier "esperando preguntas" que exista (con o sin id)
    document.getElementById("esp-wrap")?.remove();
    document.querySelectorAll(".esperando").forEach(el => el.remove());
    const main = document.getElementById("main");
    // Insertar en orden correcto
    nuevasCards.forEach(p => {
      const div = document.createElement("div");
      div.innerHTML = renderPregunta(p, activas.indexOf(p), misVotos[p.id], Array.isArray(p.opciones)?p.opciones:[]);
      // Insertar en posición correcta según orden
      const siguiente = activas[activas.indexOf(p)+1];
      const siguienteEl = siguiente ? document.getElementById(`preg-${siguiente.id}`) : null;
      if (siguienteEl) {
        main.insertBefore(div.firstElementChild, siguienteEl);
      } else {
        main.appendChild(div.firstElementChild);
      }
    });

    // 🔔 Notificación si ya había cargado antes (no es la carga inicial)
    if (window._yaInicializado) {
      mostrarNotifPregunta();
    }
  }

  // Actualizar lista global de activas
  preguntas = activas;
  preguntasCerradas = cerradas;
  actualizarNumeracionPreguntas();
}

// Actualizar "Pregunta X de N" en todos los cards
function actualizarNumeracionPreguntas() {
  preguntas.forEach((p, i) => {
    const numEl = document.querySelector(`#preg-${p.id} .preg-num`);
    if (numEl) numEl.textContent = `Pregunta ${i+1} de ${preguntas.length}`;
  });
}

// ── CARGAR EVENTO ─────────────────────────────────────
async function cargarEvento() {
  const { data } = await sb.from("eventos")
    .select("id,nombre,estado,tipo,ocultar_graficos,permitir_voto_mora,permitir_cambiar_respuestas,fecha,quorum_minimo,zoom_meeting_id,zoom_password")
    .eq("id", EV_ID).single();
  if (!data) { mostrarError("No se encontró el evento."); return; }
  evData = data;
  document.title = data.nombre + " — Portal";
  document.getElementById("nav-ev").textContent = data.nombre;

  // Mostrar barra de Zoom si el evento tiene reunión
  if (data.zoom_meeting_id) {
    document.getElementById("zoom-meeting-id-label").textContent = "Meeting ID: " + data.zoom_meeting_id;
    if (window.innerWidth >= 900) {
      // Desktop: barra sticky arriba
      const bar = document.getElementById("zoom-join-bar");
      if (bar) bar.style.display = "flex";
    } else {
      // Mobile: botón dentro del main
      const mw = document.getElementById("zoom-mobile-wrap");
      if (mw) mw.style.display = "block";
    }
  }

  await cargarPreguntas();
  // Marcar que ya cargó — a partir de aquí las nuevas preguntas muestran notificación
  window._yaInicializado = true;
}

// ── CARGAR UNIDAD INFO ────────────────────────────────
async function cargarUnidadInfo() {
  const { data } = await sb.from("unidades")
    .select("en_mora,coeficiente").eq("id", SS.unidadId).single();
  unidadInfo = data || { en_mora: false, coeficiente: 0 };
}

// ── CARGAR MIS VOTOS ──────────────────────────────────
async function cargarMisVotos() {
  const { data } = await sb.from("votos")
    .select("id_pregunta,respuesta")
    .eq("id_evento", EV_ID)
    .eq("id_unidad", SS.unidadId);
  misVotos = {};
  (data||[]).forEach(v => { misVotos[v.id_pregunta] = v.respuesta; });
}

// ── CARGAR PREGUNTAS ACTIVAS + CERRADAS ──────────────
async function cargarPreguntas() {
  const { data } = await sb.from("preguntas")
    .select("*").eq("id_evento", EV_ID)
    .in("estado", ["Activa", "Cerrada"])
    .order("orden");
  const todas = data || [];
  preguntas = todas.filter(p => p.estado === "Activa");
  preguntasCerradas = todas.filter(p => p.estado === "Cerrada");
  await cargarStatsParticipacion();
  renderMain();
}

// ── STATS PARTICIPACIÓN ───────────────────────────────
async function cargarStatsParticipacion() {
  // Todos los registrados — incluyendo delegantes (activo=false pero estado=Registrado)
  const { count: totalPart } = await sb.from("participantes")
    .select("*", { count:"exact", head:true })
    .eq("id_evento", EV_ID)
    .eq("estado", "Registrado");

  // Votos únicos por unidad
  const { data: votosUniq } = await sb.from("votos")
    .select("id_unidad,coeficiente")
    .eq("id_evento", EV_ID);

  let coefVotado = 0;
  const unidadesContadas = new Set();
  (votosUniq||[]).forEach(v => {
    if (!unidadesContadas.has(v.id_unidad)) {
      unidadesContadas.add(v.id_unidad);
      coefVotado += parseFloat(String(v.coeficiente||0).replace(",",".")) || 0;
    }
  });

  statsGlobal = {
    totalPart:    totalPart || 0,
    totalVotaron: unidadesContadas.size,
    coefVotado,
  };
}

// ── RENDER PRINCIPAL ──────────────────────────────────
function esDesktop() { return window.innerWidth >= 900; }

function renderMain() {
  const main    = document.getElementById("main");
  const sidebar = document.getElementById("sidebar-content");
  const estadoMap = {
    "Creado":      ["chip-creado","Creado"],
    "En registro": ["chip-registro","En registro"],
    "En curso":    ["chip-curso","En curso"],
    "Cerrado":     ["chip-cerrado","Cerrado"],
  };
  const [chipClass, chipLabel] = estadoMap[evData?.estado] || ["chip-creado","—"];

  // ── SIDEBAR en desktop ──
  if (esDesktop() && sidebar) {
    sidebar.innerHTML = `
      <div style="background:linear-gradient(135deg,rgba(79,5,153,.5),rgba(124,58,237,.3));border:1px solid var(--border);border-radius:20px;padding:20px;">
        <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(196,181,253,.6);margin-bottom:8px;">Evento activo</div>
        <div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:12px;">${evData?.nombre||"—"}</div>
        <div class="estado-chip ${chipClass}" style="display:inline-block;">${chipLabel}</div>
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Tu unidad</div>
          <div style="font-size:20px;font-weight:900;color:#c4b5fd;">${SS.codigo||"—"}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${SS.nombre||""}</div>
        </div>
      </div>
      ${evData?.estado === "En curso" ? `<div id="stats-bar-wrap">${renderStatsBar()}</div>` : ""}
      ${evData?.estado === "En curso" && preguntas.length ? `<div id="progreso-wrap">${renderProgresoPreguntas()}</div>` : ""}
    `;
  }

  // ── MAIN CONTENT ──
  let html = "";

  if (!esDesktop() && evData?.estado === "En curso") {
    html += `<div id="stats-bar-wrap">${renderStatsBar()}</div>`;
  }

  if (evData?.estado === "Creado") {
    html += renderEsperando("📋","Evento no iniciado","El evento aún no ha comenzado. Espera las instrucciones.");
  } else if (evData?.estado === "En registro") {
    html += renderEsperando("📝","Registro en proceso","El registro está abierto. En breve comenzará la votación.");
  } else if (evData?.estado === "Cerrado") {
    html += renderEsperando("🔒","Evento finalizado","La asamblea ha concluido. Gracias por participar.");
  } else if (evData?.estado === "En curso") {
    if (unidadInfo?.en_mora && !evData?.permitir_voto_mora) {
      // Mora: mostrar aviso fijo + historial cerradas + preguntas en modo solo lectura
      html += renderMoraAviso();
      preguntasCerradas.forEach(p => { html += renderHistorialCerrada(p); });
      if (preguntas.length) {
        html += preguntas.map((p,i) => renderPreguntaMora(p, i)).join("");
      } else if (!preguntasCerradas.length) {
        html += `<div id="esp-wrap">${renderEsperando("⏳","Esperando preguntas","El administrador activará las preguntas pronto.")}</div>`;
      }
    } else {
      // Preguntas cerradas primero (historial compacto)
      preguntasCerradas.forEach(p => {
        html += renderHistorialCerrada(p);
      });
      // Luego las activas
      if (!preguntas.length && !preguntasCerradas.length) {
        html += `<div id="esp-wrap">${renderEsperando("⏳","Esperando preguntas","El administrador activará las preguntas pronto.")}</div>`;
      } else if (!preguntas.length) {
        html += `<div id="esp-wrap">${renderEsperando("⏳","Esperando siguiente pregunta","El administrador activará la próxima pregunta pronto.", true)}</div>`;
      } else {
        html += preguntas.map((p,i) => renderPregunta(p, i, misVotos[p.id], Array.isArray(p.opciones)?p.opciones:[])).join("");
      }
    }
  }

  // Guard: en móvil si ya hay cards de preguntas activas, NO reconstruir (evita parpadeo)
  // pollPreguntas() maneja cambios quirúrgicamente
  const primerActiva = preguntas[0];
  const yaTieneActivas = !!primerActiva && !!document.getElementById(`preg-${primerActiva.id}`);
  if (yaTieneActivas && evData?.estado === "En curso" && !unidadInfo?.en_mora) {
    actualizarStatsInPlace();
    return;
  }

  main.innerHTML = html;

  // Cargar gráficas para preguntas ya votadas (y mora: mostrar a todos)
  if (!evData?.ocultar_graficos && evData?.estado === "En curso") {
    requestAnimationFrame(() => {
      preguntas.forEach(p => {
        const enMora = unidadInfo?.en_mora && !evData?.permitir_voto_mora;
        if (misVotos[p.id] || enMora) cargarYActualizarGrafica(p.id);
      });
    });
  }
}

function renderEsperando(icon, titulo, sub, sinAnim=false) {
  if (sinAnim) {
    // Sin anillo giratorio — solo icono estático
    return `<div class="esperando" style="padding:32px 20px;">
      <div style="font-size:36px;margin-bottom:12px;">${icon}</div>
      <div class="esp-titulo" style="font-size:16px;">${titulo}</div>
      <div class="esp-sub">${sub}</div>
    </div>`;
  }
  return `<div class="esperando"><div class="esp-anim"><div class="esp-ring"></div><div class="esp-ring2"></div><div class="esp-dot">${icon}</div></div>
    <div class="esp-titulo">${titulo}</div><div class="esp-sub">${sub}</div></div>`;
}

function renderHistorialCerrada(p) {
  const miVoto = misVotos[p.id];
  return `<div class="pregunta-card" id="preg-${p.id}" data-estado="cerrada" style="margin-bottom:8px;">
    <div class="preg-head" style="padding-bottom:10px;">
      <div class="preg-num">Pregunta cerrada</div>
      <div class="preg-titulo">${p.titulo||"Sin título"}</div>
    </div>
    <div class="preg-body" id="preg-body-${p.id}">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:8px;background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="13" height="13" fill="none" stroke="#f87171" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <span style="font-size:12px;font-weight:700;color:#f87171;">Cerrada</span>
        </div>
        ${miVoto
          ? `<div style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);">
              <svg width="12" height="12" fill="none" stroke="#4ade80" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
              <span style="font-size:12px;font-weight:700;color:#4ade80;">Tu voto: ${miVoto}</span>
             </div>`
          : `<span style="font-size:12px;color:var(--muted);font-style:italic;">Sin voto registrado</span>`
        }
      </div>
    </div>
  </div>`;
}

// ── STATS BAR ─────────────────────────────────────────
function renderStatsBar() {
  const total      = statsGlobal.totalPart || 0;
  const votaron    = statsGlobal.totalVotaron || 0;
  const coefVot    = statsGlobal.coefVotado || 0;
  const quorumMin  = parseFloat(evData?.quorum_minimo || 0);
  const pctNom     = total > 0 ? Math.round(votaron / total * 100) : 0;
  const coefPct    = (coefVot * 100).toFixed(2);
  const quorumAlc  = quorumMin > 0 ? (coefVot / quorumMin * 100) : null;
  const quorumColor = quorumAlc === null ? "#7c3aed" : quorumAlc >= 100 ? "#10b981" : quorumAlc >= 50 ? "#f59e0b" : "#a855f7";
  return `
  <div class="stats-bar" id="stats-bar">
    <div class="stats-title">Participación en tiempo real</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-val" id="sv-votaron">${votaron}<span class="stat-of">/${total}</span></div>
        <div class="stat-lbl">Unidades votando</div>
        <div class="stat-track"><div class="stat-fill" id="sf-nom" style="width:${pctNom}%;background:linear-gradient(90deg,#7c3aed,#c026d3);"></div></div>
        <div class="stat-pct" id="sp-nom">${pctNom}%</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="sv-coef" style="color:${quorumColor};">${coefPct}%</div>
        <div class="stat-lbl">Coeficiente votado</div>
        ${quorumAlc !== null ? `
        <div class="stat-track"><div class="stat-fill" id="sf-quorum" style="width:${Math.min(quorumAlc,100).toFixed(1)}%;background:linear-gradient(90deg,${quorumColor},${quorumColor}88);"></div></div>
        <div class="stat-pct" id="sp-quorum" style="color:${quorumColor};">${quorumAlc.toFixed(1)}% del quórum</div>
        ` : `<div style="height:14px;"></div>`}
      </div>
    </div>
    ${quorumAlc !== null && quorumAlc >= 100 ? `<div class="quorum-badge" id="qbadge">✓ Quórum alcanzado</div>` : `<div id="qbadge"></div>`}
  </div>`;
}

// Actualiza stats IN-PLACE — NO toca el DOM de las preguntas
function actualizarStatsInPlace() {
  const total      = statsGlobal.totalPart || 0;
  const votaron    = statsGlobal.totalVotaron || 0;
  const coefVot    = statsGlobal.coefVotado || 0;
  const quorumMin  = parseFloat(evData?.quorum_minimo || 0);
  const pctNom     = total > 0 ? Math.round(votaron / total * 100) : 0;
  const coefPct    = (coefVot * 100).toFixed(2);
  const quorumAlc  = quorumMin > 0 ? (coefVot / quorumMin * 100) : null;
  const quorumColor = quorumAlc === null ? "#7c3aed" : quorumAlc >= 100 ? "#10b981" : quorumAlc >= 50 ? "#f59e0b" : "#a855f7";

  const setEl = (id, val) => { const e = document.getElementById(id); if(e) e.textContent = val; };
  const setStyle = (id, prop, val) => { const e = document.getElementById(id); if(e) e.style[prop] = val; };

  const svV = document.getElementById("sv-votaron");
  if (svV) svV.innerHTML = `${votaron}<span class="stat-of">/${total}</span>`;
  setStyle("sf-nom", "width", pctNom + "%");
  setEl("sp-nom", pctNom + "%");
  setEl("sv-coef", coefPct + "%");
  setStyle("sv-coef", "color", quorumColor);
  if (quorumAlc !== null) {
    setStyle("sf-quorum", "width", Math.min(quorumAlc,100).toFixed(1) + "%");
    setEl("sp-quorum", quorumAlc.toFixed(1) + "% del quórum");
    setStyle("sp-quorum", "color", quorumColor);
    const badge = document.getElementById("qbadge");
    if (badge) {
      badge.textContent = quorumAlc >= 100 ? "✓ Quórum alcanzado" : "";
      badge.className = quorumAlc >= 100 ? "quorum-badge" : "";
    }
  }

  // Actualizar progreso sidebar
  const progWrap = document.getElementById("progreso-wrap");
  if (progWrap) progWrap.innerHTML = renderProgresoPreguntas();
}

// ── MORA ──────────────────────────────────────────────
function renderMoraAviso() {
  return `<div style="background:rgba(220,38,38,.1);border:1.5px solid rgba(220,38,38,.35);border-radius:16px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;">
    <div style="font-size:24px;flex-shrink:0;">⚠️</div>
    <div>
      <div style="font-size:14px;font-weight:800;color:#f87171;margin-bottom:4px;">Unidad en mora — solo lectura</div>
      <div style="font-size:12px;color:rgba(255,255,255,.65);line-height:1.5;">La unidad <strong style="color:#fff;">${SS.codigo}</strong> tiene cartera pendiente. Podés ver las preguntas y gráficas, pero <strong style="color:#fca5a5;">no podés emitir votos</strong> hasta ponerte al día.<br><span style="opacity:.6;font-size:11px;">Comunícate con la Administración para regularizar tu situación.</span></div>
    </div>
  </div>`;
}

function renderPreguntaMora(preg, idx) {
  // Pregunta en modo solo lectura para unidades en mora
  const opciones = Array.isArray(preg.opciones) ? preg.opciones : [];
  const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  return `<div class="pregunta-card" id="preg-${preg.id}" style="opacity:.85;">
    <div class="preg-head">
      <div class="preg-num">Pregunta ${idx+1} de ${preguntas.length}</div>
      <div class="preg-titulo">${preg.titulo||"Sin título"}</div>
      ${preg.descripcion ? `<div class="preg-desc">${preg.descripcion}</div>` : ""}
    </div>
    <div class="preg-body" id="preg-body-${preg.id}">
      <div class="opciones" style="pointer-events:none;opacity:.5;">
        ${opciones.map((op,i) => {
          const texto = typeof op==="object"?op.texto:op;
          return `<div class="opcion" id="op-${preg.id}-${i}">
            <div class="op-radio"></div>
            <div class="op-letra">${letras[i]}</div>
            <div class="op-text">${texto}</div>
          </div>`;
        }).join("")}
      </div>
      <div style="background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);border-radius:10px;padding:10px 14px;text-align:center;font-size:12px;font-weight:700;color:#f87171;margin-top:8px;">
        🔒 No podés votar — unidad en mora
      </div>
      ${!evData?.ocultar_graficos ? `<div id="res-${preg.id}" style="margin-top:12px;"></div>` : ""}
    </div>
  </div>`;
}

// ── RENDER PREGUNTA ───────────────────────────────────
function renderPregunta(preg, idx, yaVote, opciones) {
  const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const puedeEditar = yaVote && evData?.permitir_cambiar_respuestas;
  let html = `<div class="pregunta-card" id="preg-${preg.id}">
    <div class="preg-head">
      <div class="preg-num">Pregunta ${idx+1} de ${preguntas.length}</div>
      <div class="preg-titulo">${preg.titulo||"Sin título"}</div>
      ${preg.descripcion ? `<div class="preg-desc">${preg.descripcion}</div>` : ""}
    </div>
    <div class="preg-body" id="preg-body-${preg.id}">`;

  if (yaVote && !puedeEditar) {
    html += `<div class="votado-badge" id="vbadge-${preg.id}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Tu voto: <strong id="vtexto-${preg.id}">${yaVote}</strong>
    </div>`;
    if (!evData?.ocultar_graficos) html += `<div id="res-${preg.id}"></div>`;
  } else if (yaVote && puedeEditar) {
    html += `<div class="votado-badge" id="vbadge-${preg.id}" style="background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d;">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Votaste: <strong id="vtexto-${preg.id}">${yaVote}</strong> — <span style="opacity:.7;font-size:12px;">puedes cambiar</span>
    </div>
    <div class="opciones" id="ops-${preg.id}">`;
    opciones.forEach((op, i) => {
      const texto = typeof op === "object" ? op.texto : op;
      html += `<div class="opcion${texto===yaVote?" selected":""}" id="op-${preg.id}-${i}" onclick="seleccionar('${preg.id}',${i},'${texto.replace(/'/g,"\\'")}')">
        <div class="op-radio"><div class="op-check"></div></div>
        <div class="op-letra">${letras[i]}</div>
        <div class="op-text">${texto}</div>
      </div>`;
    });
    html += `</div>
    <button class="btn-votar" id="btnv-${preg.id}" onclick="votar('${preg.id}')" disabled style="background:linear-gradient(135deg,#d97706,#f59e0b);">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      Cambiar respuesta
    </button>`;
    if (!evData?.ocultar_graficos) html += `<div id="res-${preg.id}" style="margin-top:12px;"></div>`;
  } else {
    const selActual = selecciones[preg.id];
    html += `<div class="opciones" id="ops-${preg.id}">`;
    opciones.forEach((op, i) => {
      const texto = typeof op === "object" ? op.texto : op;
      html += `<div class="opcion${selActual?.idx===i?" selected":""}" id="op-${preg.id}-${i}" onclick="seleccionar('${preg.id}',${i},'${texto.replace(/'/g,"\\'")}')">
        <div class="op-radio"><div class="op-check"></div></div>
        <div class="op-letra">${letras[i]}</div>
        <div class="op-text">${texto}</div>
      </div>`;
    });
    html += `</div>
    <button class="btn-votar" id="btnv-${preg.id}" onclick="votar('${preg.id}')" ${selActual?"":"disabled"}>
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Confirmar voto
    </button>`;
  }
  html += `</div></div>`;
  return html;
}

// ── PROGRESO SIDEBAR ──────────────────────────────────
function renderProgresoPreguntas() {
  const total   = preguntas.length;
  const votadas = preguntas.filter(p => misVotos[p.id]).length;
  const pct     = total > 0 ? Math.round((votadas/total)*100) : 0;
  return `
  <div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;">
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px;">Tu progreso</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <div style="font-size:32px;font-weight:900;color:#fff;">${votadas}</div>
      <div style="color:var(--muted);font-size:13px;">de ${total}<br>preguntas<br>respondidas</div>
    </div>
    <div style="height:8px;background:rgba(124,58,237,.15);border-radius:20px;overflow:hidden;">
      <div style="height:100%;border-radius:20px;background:linear-gradient(90deg,var(--p2),var(--pink));width:${pct}%;transition:width .8s;"></div>
    </div>
    <div style="margin-top:8px;font-size:12px;font-weight:700;color:${pct===100?'#4ade80':'var(--muted)'};">${pct===100?"✓ Todas respondidas":pct+"% completado"}</div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:6px;">
      ${preguntas.map((p,i) => {
        const voto = misVotos[p.id];
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;background:${voto?'rgba(74,222,128,.08)':'rgba(255,255,255,.04)'};border:1px solid ${voto?'rgba(74,222,128,.2)':'rgba(255,255,255,.06)'};">
          <div style="width:20px;height:20px;border-radius:6px;background:${voto?'rgba(74,222,128,.2)':'rgba(124,58,237,.2)'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:${voto?'#4ade80':'#c4b5fd'};flex-shrink:0;">${i+1}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:11px;font-weight:600;color:${voto?'#fff':'var(--muted)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.titulo||"Pregunta "+(i+1)}</div>
            ${voto ? `<div style="font-size:10px;color:#4ade80;font-weight:700;">✓ ${voto}</div>` : `<div style="font-size:10px;color:var(--muted);">Pendiente</div>`}
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

// ── SELECCIONAR OPCIÓN ────────────────────────────────
const selecciones = {};
function seleccionar(pregId, idx, texto) {
  selecciones[pregId] = { idx, texto };
  document.querySelectorAll(`#ops-${pregId} .opcion`).forEach(el => el.classList.remove("selected"));
  document.getElementById(`op-${pregId}-${idx}`)?.classList.add("selected");
  const btn = document.getElementById(`btnv-${pregId}`);
  if (btn) btn.removeAttribute("disabled");
}

// ── VOTAR ─────────────────────────────────────────────
async function votar(pregId) {
  const sel = selecciones[pregId];
  if (!sel) return;

  const btn = document.getElementById(`btnv-${pregId}`);
  if (btn) { btn.disabled = true; btn.innerHTML = `<div class="spin"></div>Enviando…`; }

  const coef = parseFloat(String(unidadInfo?.coeficiente||0).replace(",",".")) || 0;
  const { error } = await sb.from("votos").upsert({
    id_pregunta: pregId, id_evento: EV_ID,
    id_unidad: SS.unidadId, respuesta: sel.texto, coeficiente: coef,
  }, { onConflict: "id_pregunta,id_unidad" });

  if (error) {
    if (btn) { btn.disabled = false; btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Confirmar voto`; }
    toast(error.code==="42501" ? "Sin permisos. Contacta al administrador." : "Error: "+(error.message||"Intenta de nuevo"), "err");
    return;
  }

  // Votar automáticamente en nombre de las unidades que delegaron su poder
  const { data: delegantes } = await sb.from("delegaciones")
    .select("id_unidad_entrega")
    .eq("id_evento", EV_ID)
    .eq("id_unidad_recibe", SS.unidadId);

  if (delegantes && delegantes.length > 0) {
    for (const d of delegantes) {
      if (!d.id_unidad_entrega) continue;
      // Obtener el coeficiente propio de la unidad delegante
      const { data: uDel } = await sb.from("unidades")
        .select("coeficiente").eq("id", d.id_unidad_entrega);
      const coefDel = uDel && uDel.length > 0
        ? parseFloat(String(uDel[0].coeficiente||0).replace(",",".")) || 0
        : 0;
      await sb.from("votos").upsert({
        id_pregunta: pregId, id_evento: EV_ID,
        id_unidad: d.id_unidad_entrega, respuesta: sel.texto, coeficiente: coefDel,
      }, { onConflict: "id_pregunta,id_unidad" });
    }
  }

  const esCambio = !!misVotos[pregId];
  misVotos[pregId] = sel.texto;
  toast(esCambio ? "✓ Respuesta actualizada" : "✓ Voto registrado", "ok");

  // Actualizar DOM quirúrgicamente — SIN outerHTML del card
  _actualizarCardTrasVoto(pregId, sel.texto);

  // Stats en segundo plano
  cargarStatsParticipacion().then(() => actualizarStatsInPlace());

  // Gráfica
  if (!evData?.ocultar_graficos) {
    delete portalCharts[pregId];
    delete portalChartCache[pregId];
    setTimeout(() => cargarYActualizarGrafica(pregId), 80);
  }
}

// Actualización quirúrgica del card tras votar — NO usa outerHTML
function _actualizarCardTrasVoto(pregId, texto) {
  const puedeEditar = evData?.permitir_cambiar_respuestas;

  // Actualizar badge de voto
  const badge = document.getElementById(`vbadge-${pregId}`);
  const vtexto = document.getElementById(`vtexto-${pregId}`);
  if (vtexto) {
    vtexto.textContent = texto;
  } else if (!badge) {
    // Crear badge por primera vez (primera votación)
    const body = document.getElementById(`preg-body-${pregId}`);
    if (body) {
      const badgeDiv = document.createElement("div");
      badgeDiv.className = puedeEditar ? "votado-badge" : "votado-badge";
      badgeDiv.id = `vbadge-${pregId}`;
      badgeDiv.style.cssText = puedeEditar ? "background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d;" : "";
      badgeDiv.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${puedeEditar?"Votaste:":"Tu voto:"} <strong id="vtexto-${pregId}">${texto}</strong>${puedeEditar?' — <span style="opacity:.7;font-size:12px;">puedes cambiar</span>':""}`;
      body.insertBefore(badgeDiv, body.firstChild);
    }
  } else {
    // Badge existe pero sin vtexto — actualizarlo entero
    if (puedeEditar) {
      badge.style.cssText = "background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d;";
      badge.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Votaste: <strong id="vtexto-${pregId}">${texto}</strong> — <span style="opacity:.7;font-size:12px;">puedes cambiar</span>`;
    }
  }

  // Si no puede editar: ocultar opciones y botón después de votar
  if (!puedeEditar) {
    const ops = document.getElementById(`ops-${pregId}`);
    const btn = document.getElementById(`btnv-${pregId}`);
    if (ops) ops.style.display = "none";
    if (btn) btn.style.display = "none";
  } else {
    // Puede editar: restaurar botón y deseleccionar opciones
    const btn = document.getElementById(`btnv-${pregId}`);
    if (btn) {
      btn.disabled = true; // deshabilitar hasta nueva selección
      btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Cambiar respuesta`;
    }
    // Marcar opción actual como selected
    document.querySelectorAll(`#ops-${pregId} .opcion`).forEach(el => el.classList.remove("selected"));
    const preg = preguntas.find(p => String(p.id) === String(pregId));
    const opciones = Array.isArray(preg?.opciones) ? preg.opciones : [];
    opciones.forEach((op, i) => {
      const t = typeof op === "object" ? op.texto : op;
      if (t === texto) document.getElementById(`op-${pregId}-${i}`)?.classList.add("selected");
    });
    delete selecciones[pregId]; // limpiar selección pendiente
  }

  // Actualizar progreso sidebar
  const progWrap = document.getElementById("progreso-wrap");
  if (progWrap) progWrap.innerHTML = renderProgresoPreguntas();

  // Asegurarse que el div de resultado existe
  if (!evData?.ocultar_graficos) {
    let resEl = document.getElementById(`res-${pregId}`);
    if (!resEl) {
      const body = document.getElementById(`preg-body-${pregId}`);
      if (body) {
        resEl = document.createElement("div");
        resEl.id = `res-${pregId}`;
        resEl.style.marginTop = "12px";
        body.appendChild(resEl);
      }
    }
  }
}

// ─── PORTAL CHARTS ─────────────────────────────────────
const PORTAL_COLORS = [
  { bg:"rgba(168,85,247,.85)", border:"#a855f7" },
  { bg:"rgba(34,211,238,.85)", border:"#22d3ee" },
  { bg:"rgba(251,146,60,.85)", border:"#fb923c" },
  { bg:"rgba(74,222,128,.85)", border:"#4ade80" },
  { bg:"rgba(248,113,113,.85)",border:"#f87171" },
  { bg:"rgba(250,204,21,.85)", border:"#facc15" },
];

// { pregId: Chart instance }
const portalCharts = {};
// { pregId: { resData, totalVotos, quorumMin } }
const portalChartCache = {};
// { pregId: "coef"|"quorum"|"nominal" } — métrica activa
const chartMetrica = {};

// ── CARGAR Y ACTUALIZAR GRÁFICA ───────────────────────
async function cargarYActualizarGrafica(pregId) {
  if (evData?.ocultar_graficos) return;

  const { data: votos } = await sb.from("votos")
    .select("respuesta,coeficiente,id_unidad")
    .eq("id_pregunta", pregId);

  if (!votos) return;

  const preg     = preguntas.find(p => String(p.id) === String(pregId));
  const opciones = Array.isArray(preg?.opciones) ? preg.opciones : [];
  const miVoto   = misVotos[pregId];
  const quorumMin = parseFloat(evData?.quorum_minimo || 0);

  // Calcular por opción
  const totCoef = {}, totNom = {}, totUniq = new Set();
  opciones.forEach(op => { const t = typeof op==="object"?op.texto:op; totCoef[t]=0; totNom[t]=0; });
  votos.forEach(v => {
    const r = v.respuesta;
    if (!totCoef[r]) { totCoef[r]=0; totNom[r]=0; }
    totCoef[r] += parseFloat(String(v.coeficiente||0).replace(",",".")) || 0;
    totNom[r]  += 1;
    totUniq.add(v.id_unidad);
  });
  const sumCoef = Object.values(totCoef).reduce((a,b)=>a+b, 0);

  const resData = opciones.map((op, i) => {
    const texto = typeof op==="object" ? op.texto : op;
    const coef  = totCoef[texto] || 0;
    const nom   = totNom[texto]  || 0;
    return {
      texto, idx: i,
      coefPct:   sumCoef > 0 ? (coef/sumCoef)*100 : 0,
      quorumPct: quorumMin > 0 ? (coef/quorumMin)*100 : 0,
      nominal:   nom,
    };
  });

  portalChartCache[pregId] = { resData, totalVotos: votos.length, miVoto, quorumMin };

  const resEl = document.getElementById(`res-${pregId}`);
  if (!resEl) return;

  const chartExists = !!portalCharts[pregId];

  if (!chartExists) {
    // Primera vez: construir HTML
    resEl.innerHTML = buildChartCard(pregId, resData, miVoto, votos.length, quorumMin);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        dibujarChart(pregId, resData, miVoto);
      });
    });
  } else {
    // Ya existe: actualizar solo datos
    actualizarGraficaDesdeCache(pregId);
  }
}

function actualizarGraficaDesdeCache(pregId) {
  const cache = portalChartCache[pregId];
  if (!cache || !portalCharts[pregId]) return;
  const { resData, totalVotos, miVoto } = cache;
  const metrica = chartMetrica[pregId] || "coef";

  // Actualizar chart data
  const chart = portalCharts[pregId];
  chart.data.datasets[0].data = resData.map(r => getMetricVal(r, metrica));
  chart.update("none"); // sin animación para velocidad

  // Actualizar contador
  const cntEl = document.getElementById(`res-cnt-${pregId}`);
  if (cntEl) cntEl.textContent = `${totalVotos} voto${totalVotos!==1?"s":""}`;

  // Actualizar tabla CSS
  resData.forEach((r, i) => {
    const val = getMetricVal(r, metrica);
    const maxVal = Math.max(...resData.map(x => getMetricVal(x, metrica)));
    const pctAncho = maxVal > 0 ? (val/maxVal)*100 : 0;
    const el_bar = document.getElementById(`rbar-${pregId}-${i}`);
    const el_val = document.getElementById(`rval-${pregId}-${i}`);
    const el_nom = document.getElementById(`rnom-${pregId}-${i}`);
    if (el_bar) el_bar.style.width = pctAncho + "%";
    if (el_val) el_val.textContent = formatMetricVal(r, metrica);
    if (el_nom) el_nom.textContent = r.nominal + " unid.";
  });
}

function getMetricVal(r, metrica) {
  if (metrica === "quorum") return +r.quorumPct.toFixed(2);
  if (metrica === "nominal") return r.nominal;
  return +r.coefPct.toFixed(2);
}

function formatMetricVal(r, metrica) {
  if (metrica === "quorum")  return r.quorumPct.toFixed(1) + "% quórum";
  if (metrica === "nominal") return r.nominal + " unid.";
  return r.coefPct.toFixed(1) + "%";
}

// ── CONSTRUIR HTML DEL CARD ───────────────────────────
function buildChartCard(pregId, resData, miVoto, totalVotos, quorumMin) {
  const isMobile = window.innerWidth < 600;
  const metrica  = chartMetrica[pregId] || "coef";

  const btnStyle = (m) => metrica===m
    ? "padding:5px 10px;border-radius:20px;border:1.5px solid rgba(168,85,247,.6);background:rgba(168,85,247,.2);color:#c4b5fd;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;"
    : "padding:5px 10px;border-radius:20px;border:1.5px solid rgba(255,255,255,.12);background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;";

  return `
  <div class="resultado-card" id="rescard-${pregId}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);">📊 <span id="res-cnt-${pregId}">${totalVotos} voto${totalVotos!==1?"s":""}</span></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        <button style="${btnStyle('coef')}" id="mbtn-coef-${pregId}" onclick="cambiarMetrica('${pregId}','coef')">Coef.</button>
        ${quorumMin > 0 ? `<button style="${btnStyle('quorum')}" id="mbtn-quorum-${pregId}" onclick="cambiarMetrica('${pregId}','quorum')">Quórum</button>` : ""}
        <button style="${btnStyle('nominal')}" id="mbtn-nominal-${pregId}" onclick="cambiarMetrica('${pregId}','nominal')">Nominal</button>
      </div>
    </div>
    <!-- Canvas chart -->
    <div style="position:relative;height:${isMobile ? Math.max(resData.length*38+20,130)+'px' : '220px'};" id="chwrap-${pregId}">
      <canvas id="chart-${pregId}"></canvas>
    </div>
    <!-- Tabla debajo -->
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:6px;" id="chartabla-${pregId}">
      ${buildTablaRows(pregId, resData, miVoto, metrica)}
    </div>
  </div>`;
}

function buildTablaRows(pregId, resData, miVoto, metrica) {
  return resData.map((r, i) => {
    const esMio  = r.texto === miVoto;
    const color  = PORTAL_COLORS[i%PORTAL_COLORS.length].border;
    const val    = formatMetricVal(r, metrica);
    const maxVal = Math.max(...resData.map(x => getMetricVal(x, metrica)));
    const pctAncho = maxVal > 0 ? (getMetricVal(r, metrica)/maxVal)*100 : 0;
    return `<div style="display:flex;align-items:center;gap:8px;">
      <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
          <span style="font-size:11px;font-weight:${esMio?800:600};color:${esMio?'#4ade80':'#c4b5fd'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52%;">${r.texto}${esMio?' ✓':''}</span>
          <div style="display:flex;gap:6px;align-items:center;white-space:nowrap;">
            <span id="rval-${pregId}-${i}" style="font-size:11px;font-weight:800;color:#fff;">${val}</span>
            <span id="rnom-${pregId}-${i}" style="font-size:10px;color:var(--muted);">${r.nominal} unid.</span>
          </div>
        </div>
        <div style="height:5px;background:rgba(255,255,255,.07);border-radius:20px;overflow:hidden;">
          <div id="rbar-${pregId}-${i}" style="height:100%;border-radius:20px;background:${esMio?'linear-gradient(90deg,#4ade80,#22d3ee)':color};width:${pctAncho}%;transition:width .6s ease;"></div>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── DIBUJAR CHART (primera vez) ───────────────────────
function dibujarChart(pregId, resData, miVoto) {
  const canvas = document.getElementById(`chart-${pregId}`);
  if (!canvas) return;
  if (portalCharts[pregId]) { portalCharts[pregId].destroy(); }

  const metrica  = chartMetrica[pregId] || "coef";
  const isMobile = window.innerWidth < 600;
  const labels   = resData.map(r => r.texto.length > (isMobile?10:14) ? r.texto.slice(0,isMobile?9:13)+"…" : r.texto);
  const vals     = resData.map(r => getMetricVal(r, metrica));
  const bgColors = resData.map((_,i) => PORTAL_COLORS[i%PORTAL_COLORS.length].bg);
  const brColors = resData.map((_,i) => PORTAL_COLORS[i%PORTAL_COLORS.length].border);

  portalCharts[pregId] = new Chart(canvas, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: vals,
        backgroundColor: bgColors,
        borderColor: brColors,
        borderWidth: 2,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: isMobile ? "y" : "x",
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 350 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "rgba(10,5,25,.95)",
          titleColor:"#fff", bodyColor:"#c4b5fd",
          borderColor:"rgba(168,85,247,.4)", borderWidth:1, padding:10,
          callbacks: {
            title: items => resData[items[0].dataIndex]?.texto || "",
            label: c => {
              const r = resData[c.dataIndex];
              const m = chartMetrica[pregId] || "coef";
              return ` ${formatMetricVal(r, m)} · ${r.nominal} unid.`;
            }
          }
        }
      },
      scales: {
        [isMobile ? "x" : "y"]: {
          beginAtZero: true,
          grid: { color:"rgba(255,255,255,.05)", drawBorder:false },
          ticks: { color:"rgba(196,181,253,.6)", font:{size:9},
            callback: v => {
              const m = chartMetrica[pregId] || "coef";
              return m==="nominal" ? v : v+"%";
            }
          }
        },
        [isMobile ? "y" : "x"]: {
          grid: { display: false },
          ticks: { color:"#c4b5fd", font:{ size:9, weight:"600" }, maxRotation: isMobile?0:20 }
        }
      }
    }
  });
}

// ── CAMBIAR MÉTRICA ───────────────────────────────────
function cambiarMetrica(pregId, metrica) {
  chartMetrica[pregId] = metrica;
  const cache = portalChartCache[pregId];
  if (!cache) return;

  // Actualizar estilos de botones
  ["coef","quorum","nominal"].forEach(m => {
    const btn = document.getElementById(`mbtn-${m}-${pregId}`);
    if (!btn) return;
    btn.style.background = m===metrica ? "rgba(168,85,247,.2)" : "transparent";
    btn.style.borderColor = m===metrica ? "rgba(168,85,247,.6)" : "rgba(255,255,255,.12)";
    btn.style.color = m===metrica ? "#c4b5fd" : "var(--muted)";
  });

  // Actualizar datos del chart
  const chart = portalCharts[pregId];
  if (chart) {
    chart.data.datasets[0].data = cache.resData.map(r => getMetricVal(r, metrica));
    chart.options.scales[window.innerWidth<600?"x":"y"].ticks.callback =
      v => metrica==="nominal" ? v : v+"%";
    chart.update();
  }

  // Actualizar tabla
  const tablaEl = document.getElementById(`chartabla-${pregId}`);
  if (tablaEl) tablaEl.innerHTML = buildTablaRows(pregId, cache.resData, cache.miVoto, metrica);
}

// ── TOAST ─────────────────────────────────────────────
let _tt;
function toast(msg, tipo="ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = tipo==="err"?"#dc2626":tipo==="warn"?"#b45309":"#4f0599";
  t.className = "show";
  clearTimeout(_tt);
  _tt = setTimeout(()=>t.className="", 3500);
}

// Re-render on resize — solo si cambia entre mobile↔desktop
// En móvil el browser-chrome sube/baja al scrollear y dispara resize constantemente
let _lastWasDesktop = window.innerWidth >= 900; // inicializar al cargar
let _resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    const nowDesktop = esDesktop();
    // Solo re-render si REALMENTE cambió el breakpoint
    if (_lastWasDesktop !== null && nowDesktop !== _lastWasDesktop) {
      _lastWasDesktop = nowDesktop;
      if (evData) renderMain();
    }
  }, 400);
});

// Actualizar al volver a la pestaña — solo stats y charts, NO renderMain
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && evData) {
    pingSession(); // ping inmediato al volver
    cargarStatsParticipacion().then(() => {
      actualizarStatsInPlace();
      if (!evData?.ocultar_graficos) {
        Object.keys(portalCharts).forEach(pregId => cargarYActualizarGrafica(pregId));
      }
    });
  }
});

init();


// ── ZOOM (iframe Web Client) ──────────────────────────────────────────
let _zoomMinimizado = false;
let _zoomPip        = false;
let _zoomH          = 340; // altura inicial desktop

function esMobile() { return window.innerWidth < 900; }

function abrirZoomMobile() {
  if (!evData?.zoom_meeting_id) { toast("No hay reunión configurada","warn"); return; }
  const meetingNumber = String(evData.zoom_meeting_id).replace(/\s/g,"");
  const password      = evData.zoom_password || "";
  window.open(`https://zoom.us/j/${meetingNumber}?pwd=${password}`, "_blank");
}

let _zoomColW = 460;

function unirseZoom() {
  if (!evData?.zoom_meeting_id) { toast("No hay reunión configurada","warn"); return; }
  if (esMobile()) { abrirZoomMobile(); return; }

  const meetingNumber = String(evData.zoom_meeting_id).replace(/\s/g,"");
  const password      = evData.zoom_password || "";
  const userName      = encodeURIComponent((SS.nombre || ("Unidad " + SS.codigo)).substring(0,50));
  const url           = `https://app.zoom.us/wc/${meetingNumber}/join?prefer=1&pwd=${password}&uname=${userName}`;

  document.getElementById("zoom-iframe").src = url;
  document.getElementById("zoom-container-wrapper").style.display = "block";
  document.getElementById("zoom-join-bar").style.display = "none";

  document.documentElement.style.setProperty("--zoom-col-w", _zoomColW + "px");
  document.documentElement.style.setProperty("--zoom-h", _zoomH + "px");
  document.body.classList.add("with-zoom-split");
  document.getElementById("zoom-resize-handle").style.display = "flex";
  actualizarZoomSidebarStats();
}

function actualizarZoomSidebarStats() {
  const el = document.getElementById("zoom-sidebar-stats");
  if (!el || !document.body.classList.contains("with-zoom-split")) return;
  const total   = statsGlobal.totalPart || 0;
  const votaron = statsGlobal.totalVotaron || 0;
  const coef    = (statsGlobal.coefVotado * 100).toFixed(1);
  el.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div style="text-align:center;"><div style="font-size:22px;font-weight:900;color:#fff;">' + votaron + '<span style="font-size:12px;color:var(--muted);">/' + total + '</span></div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Votando</div></div><div style="text-align:center;"><div style="font-size:22px;font-weight:900;color:#a855f7;">' + coef + '%</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Coef. votado</div></div></div>';
}

function iniciarResize(e) {
  e.preventDefault();
  const startY = e.clientY, startH = _zoomH;
  const wrapper = document.getElementById("zoom-container-wrapper");
  function onMove(ev) {
    const newH = Math.max(180, Math.min(window.innerHeight * 0.8, startH + (ev.clientY - startY)));
    _zoomH = newH;
    wrapper.style.height = newH + "px";
    document.documentElement.style.setProperty("--zoom-h", newH + "px");
  }
  function onUp() { document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); }
  document.addEventListener("mousemove", onMove);
  document.addEventListener("mouseup", onUp);
}

function iniciarResizeCol(e) {
  e.preventDefault();
  const startX = e.clientX, startW = _zoomColW;
  const handle = document.getElementById("zoom-col-handle");
  if(handle) handle.classList.add("dragging");
  function onMove(ev) {
    const newW = Math.max(280, Math.min(window.innerWidth * 0.7, startW + (ev.clientX - startX)));
    _zoomColW = newW;
    document.documentElement.style.setProperty("--zoom-col-w", newW + "px");
  }
  function onUp() {
    if(handle) handle.classList.remove("dragging");
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onUp);
  }
  document.addEventListener("mousemove", onMove);
  document.addEventListener("mouseup", onUp);
}

// ── Notificación nueva pregunta ───────────────────────────────────────
let _notifTimer = null;
function mostrarNotifPregunta() {
  const notif = document.getElementById("notif-nueva-preg");
  if (!notif) return;
  notif.style.display = "flex";
  if (_notifTimer) clearTimeout(_notifTimer);
  _notifTimer = setTimeout(() => { notif.style.display = "none"; }, 6000);
  // Vibrar en móvil
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

function scrollAlPrimer() {
  document.getElementById("notif-nueva-preg").style.display = "none";
  const primera = document.querySelector(".pregunta-card");
  if (primera) primera.scrollIntoView({ behavior:"smooth", block:"center" });
}

</script>
