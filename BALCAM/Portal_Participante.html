<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BALCAM — Portal de Votación</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --p:#4f0599;--p2:#7c3aed;--pink:#d946ef;
  --dark:#0f0a1e;--card:#1a1030;--card2:#221540;
  --text:#f1eeff;--muted:#9d8ec0;--border:rgba(124,58,237,.25);
  --green:#10b981;--red:#f43f5e;--gold:#f59e0b;
}
html{height:100%;}
body{
  font-family:'Outfit',system-ui,sans-serif;
  background:var(--dark);color:var(--text);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(79,5,153,.35) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(217,70,239,.2) 0%, transparent 40%),
    radial-gradient(ellipse at 60% 80%, rgba(124,58,237,.2) 0%, transparent 40%);
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#4f0599;border-radius:4px;}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(15,10,30,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-brand{font-size:16px;font-weight:900;letter-spacing:-.5px;color:#fff;}
.nav-brand span{color:var(--pink);}
.nav-user{text-align:right;}
.nav-nombre{font-size:13px;font-weight:700;color:#fff;}
.nav-unidad{font-size:11px;color:var(--muted);}
.nav-ev{
  background:rgba(124,58,237,.15);border:1px solid var(--border);
  border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;
  color:#c4b5fd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:200px;
}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 56px);}

/* MOBILE: columna única centrada */
.main{
  width:100%;max-width:540px;
  margin:0 auto;padding:20px 16px 40px;
}
.sidebar{display:none;}

/* DESKTOP (≥900px): sidebar fijo izquierda + contenido derecha */
@media(min-width:900px){
  .layout{
    max-width:1200px;margin:0 auto;
    display:grid;
    grid-template-columns:300px 1fr;
    gap:28px;
    padding:28px 32px 48px;
    align-items:start;
  }
  .main{
    max-width:100%;margin:0;padding:0;
    grid-column:2;
    /* Preguntas se muestran en grid de 1 col, más anchas */
  }
  .sidebar{
    display:flex;flex-direction:column;gap:14px;
    position:sticky;top:76px;
    grid-column:1;
  }
  /* En desktop las pregunta-card se ven más amplias */
  .preg-titulo{font-size:20px;}
  .btn-votar{font-size:15px;padding:16px;}
  .opcion{padding:16px 20px;}
  .op-text{font-size:16px;}
  /* Stats bar en desktop va al sidebar */
  .stats-bar{margin-bottom:0;}
  /* Dos columnas para opciones cuando hay muchas */
  .opciones.muchas{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
}
@media(min-width:1200px){
  .layout{grid-template-columns:320px 1fr;}
}

/* ── ESPERANDO ── */
.esperando{
  text-align:center;padding:60px 20px;
}
.esp-anim{
  width:90px;height:90px;margin:0 auto 24px;position:relative;
}
.esp-ring{
  position:absolute;inset:0;border-radius:50%;
  border:3px solid transparent;
  border-top-color:var(--p2);border-right-color:var(--pink);
  animation:spin-ring 2s linear infinite;
}
.esp-ring2{
  position:absolute;inset:8px;border-radius:50%;
  border:2px solid transparent;
  border-bottom-color:var(--pink);
  animation:spin-ring 1.5s linear infinite reverse;
}
.esp-dot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;}
@keyframes spin-ring{to{transform:rotate(360deg);}}
.esp-title{font-size:20px;font-weight:800;margin-bottom:8px;}
.esp-sub{font-size:14px;color:var(--muted);line-height:1.6;}
.esp-ev{
  margin-top:20px;background:rgba(124,58,237,.12);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;
}
.esp-ev-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;}
.esp-ev-nombre{font-size:15px;font-weight:800;color:#fff;}

/* ── PREGUNTA ── */
.pregunta-card{
  background:var(--card);border-radius:22px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:slide-in .4s ease;
}
@keyframes slide-in{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.preg-head{
  background:linear-gradient(135deg,var(--p),var(--pink));
  padding:20px 22px;
}
.preg-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.6);margin-bottom:6px;}
.preg-titulo{font-size:18px;font-weight:800;color:#fff;line-height:1.3;}
.preg-desc{font-size:13px;color:rgba(255,255,255,.7);margin-top:6px;line-height:1.5;}
.preg-body{padding:20px;}

/* Opciones */
.opciones{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.opcion{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:14px;cursor:pointer;
  border:2px solid rgba(124,58,237,.2);background:rgba(124,58,237,.05);
  transition:all .2s;position:relative;overflow:hidden;
}
.opcion:hover{border-color:var(--p2);background:rgba(124,58,237,.12);}
.opcion.selected{border-color:var(--p2);background:rgba(124,58,237,.2);}
.opcion.selected::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(124,58,237,.15),transparent);
}
.op-radio{
  width:22px;height:22px;border-radius:50%;border:2px solid rgba(124,58,237,.4);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;
}
.opcion.selected .op-radio{border-color:var(--p2);background:var(--p2);}
.op-check{display:none;width:10px;height:10px;border-radius:50%;background:#fff;}
.opcion.selected .op-check{display:block;}
.op-text{font-size:15px;font-weight:600;color:#fff;}
.op-letra{
  width:28px;height:28px;border-radius:8px;
  background:rgba(124,58,237,.2);color:#c4b5fd;
  font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* Botón votar */
.btn-votar{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--p),var(--p2));
  color:#fff;border:none;border-radius:14px;
  font-size:16px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 20px rgba(79,5,153,.4);transition:.25s;
  letter-spacing:.02em;
}
.btn-votar:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,5,153,.5);}
.btn-votar:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── RESULTADO / GRÁFICA ── */
.resultado-card{
  background:var(--card);border-radius:22px;border:1px solid var(--border);
  padding:22px;margin-top:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:slide-in .4s ease;
}
.res-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px;}
.res-barra-wrap{margin-bottom:10px;}
.res-label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:5px;}
.res-label .pct{color:var(--p2);font-weight:800;}
.res-barra-bg{background:rgba(124,58,237,.15);border-radius:20px;height:10px;overflow:hidden;}
.res-barra{height:100%;border-radius:20px;transition:width 1s ease;min-width:4px;}
.res-barra.mi-voto{background:linear-gradient(90deg,var(--p2),var(--pink));}
.res-barra.otro{background:rgba(124,58,237,.3);}
.mi-voto-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(124,58,237,.2);border:1px solid var(--border);
  border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:#c4b5fd;
  margin-left:6px;
}

/* ── VOTADO ── */
.votado-badge{
  background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);
  border-radius:14px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:700;color:#6ee7b7;margin-bottom:16px;
}

/* ── ESTADO DEL EVENTO ── */
.ev-estado-bar{
  background:var(--card);border-radius:16px;border:1px solid var(--border);
  padding:14px 18px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;
}
.ev-nombre-bar{font-size:14px;font-weight:800;color:#fff;}
.estado-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;}
.chip-creado{background:rgba(148,163,184,.15);color:#94a3b8;}
.chip-registro{background:rgba(245,158,11,.15);color:#fbbf24;}
.chip-curso{background:rgba(16,185,129,.15);color:#6ee7b7;}
.chip-cerrado{background:rgba(244,63,94,.15);color:#fb7185;}

/* Sin preguntas */
.sin-preg{text-align:center;padding:48px 20px;color:var(--muted);}
.sin-preg svg{margin-bottom:16px;opacity:.4;}
.sin-preg h3{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;}

/* Spin */
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
.spin-dark{width:32px;height:32px;border:3px solid rgba(124,58,237,.2);border-top-color:var(--p2);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto;}
@keyframes sp{to{transform:rotate(360deg);}}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;opacity:0;pointer-events:none;transition:all .3s;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── RESULTADO CARD — nuevo sistema ── */
.resultado-card{
  background:var(--card2);border-radius:18px;border:1px solid var(--border);
  padding:16px;margin-top:14px;
  animation:slide-in .3s ease;
}
.res-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
.res-title{font-size:12px;font-weight:700;color:var(--muted);}
.res-tipo-btns{display:flex;gap:4px;}
.res-tipo-btn{
  padding:5px 10px;border-radius:8px;border:1.5px solid rgba(255,255,255,.1);
  background:transparent;color:var(--muted);font-size:13px;cursor:pointer;
  transition:all .2s;
}
.res-tipo-btn.on{
  border-color:rgba(168,85,247,.6);background:rgba(168,85,247,.2);color:#c4b5fd;
}
.res-leyenda{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.res-ley-item{
  display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  font-size:11px;font-weight:600;color:var(--muted);
}
.res-ley-item.mio{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.25);color:#4ade80;}
.res-ley-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
/* Canvas wrapper — altura adaptiva por breakpoint */
.res-canvas-wrap{
  position:relative;
  height: 150px; /* mobile <480px */
  margin-bottom:12px;
}
@media(min-width:480px){ .res-canvas-wrap{ height:190px; } }
@media(min-width:700px){ .res-canvas-wrap{ height:230px; } }
@media(min-width:900px){ .res-canvas-wrap{ height:220px; } }
/* Barras CSS */
.res-barras-css{display:flex;flex-direction:column;gap:8px;}
.res-fila{display:flex;align-items:center;gap:8px;}
.res-fila-label{
  font-size:11px;font-weight:600;color:var(--muted);
  width:60px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
@media(min-width:480px){ .res-fila-label{ width:90px; } }
.res-fila-label.mio{color:#4ade80;}
.res-fila-track{
  flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:20px;overflow:hidden;
}
.res-fila-fill{height:100%;border-radius:20px;transition:width .6s ease;min-width:3px;}
.res-fila-nums{display:flex;flex-direction:column;align-items:flex-end;min-width:52px;}
.res-fila-pct{font-size:11px;font-weight:800;color:#c4b5fd;}
.res-fila-cnt{font-size:10px;color:var(--muted);}

/* Sidebar card base */
.sidebar > * { animation: slide-in .35s ease; }

/* Desktop nav wider */
@media(min-width:900px){
  .nav{ padding:0 32px; }
  .nav-ev{ max-width:360px; }
}

/* ── STATS BAR ── */
.stats-bar{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:18px 20px;margin-bottom:16px;
  animation:slide-in .4s ease;
}
.stats-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.stat-item{}
.stat-val{font-size:26px;font-weight:900;color:#fff;line-height:1;margin-bottom:3px;}
.stat-val .stat-of{font-size:14px;font-weight:600;color:var(--muted);}
.stat-lbl{font-size:11px;color:var(--muted);margin-bottom:7px;}
.stat-track{height:6px;background:rgba(124,58,237,.15);border-radius:20px;overflow:hidden;margin-bottom:4px;}
.stat-fill{height:100%;border-radius:20px;transition:width 1s ease;min-width:4px;}
.stat-pct{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);}
.quorum-badge{
  margin-top:12px;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);
  border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;color:#6ee7b7;
  text-align:center;
}
/* ── MORA BLOQUEO ── */
.mora-bloqueo{
  background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);
  border-radius:22px;padding:40px 24px;text-align:center;margin-top:16px;
}
.mora-titulo{font-size:22px;font-weight:900;color:#fca5a5;margin-bottom:10px;}
.mora-sub{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:14px;}
.mora-contacto{font-size:12px;color:rgba(255,255,255,.4);border-top:1px solid rgba(255,255,255,.1);padding-top:14px;margin-top:14px;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div>
    <div class="nav-brand">BAL<span>CAM</span></div>
  </div>
  <div id="nav-ev" class="nav-ev">Cargando…</div>
  <div class="nav-user">
    <div id="nav-nombre" class="nav-nombre">—</div>
    <div id="nav-unidad" class="nav-unidad">Unidad —</div>
  </div>
</nav>

<!-- LAYOUT WRAPPER -->
<div class="layout">

  <!-- SIDEBAR (solo visible en desktop) -->
  <aside class="sidebar" id="sidebar">
    <!-- Stats y info del evento van aquí en desktop -->
    <div id="sidebar-content">
      <div style="display:flex;justify-content:center;padding:40px 0;">
        <div class="spin-dark"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main" id="main">
    <div style="display:flex;justify-content:center;padding:60px 0;">
      <div class="spin-dark"></div>
    </div>
  </div>

</div><!-- /layout -->

<div id="toast"></div>

<script>
const sb = supabase.createClient(
  "https://gwvqttdjevogjvldzspf.supabase.co",
  "sb_publishable_e1x6gdl3QHjwdKa5UIjYxQ_eMkUaTad"
);

// ── SESIÓN ────────────────────────────────────────────
const SS = {
  unidadId: sessionStorage.getItem("part_unidad_id"),
  codigo:   sessionStorage.getItem("part_codigo"),
  nombre:   sessionStorage.getItem("part_nombre"),
  evId:     sessionStorage.getItem("part_ev_id"),
  orgId:    sessionStorage.getItem("part_org_id"),
};
const EV_ID  = SS.evId;
const ORG_ID = SS.orgId;

let evData      = null;
let preguntas   = [];
let misVotos    = {};
let unidadInfo  = null;
let statsGlobal = { totalPart:0, totalVotaron:0, coefVotado:0 };
let pollingInt  = null;  // intervalo de polling

// ── INIT ──────────────────────────────────────────────
async function init() {
  if (!SS.unidadId || !EV_ID) {
    location.href = `Login_Participante.html?ev=${EV_ID||""}&org=${ORG_ID||""}`;
    return;
  }
  document.getElementById("nav-nombre").textContent = SS.nombre || "Participante";
  document.getElementById("nav-unidad").textContent = "Unidad " + (SS.codigo || "—");

  try {
    await Promise.all([cargarEvento(), cargarMisVotos(), cargarUnidadInfo()]);
    iniciarPolling();
  } catch(e) {
    mostrarError("Error al cargar el portal. Recarga la página.");
  }
}

function mostrarError(msg) {
  document.getElementById("main").innerHTML = `
    <div style="text-align:center;padding:60px 20px;">
      <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
      <div style="font-size:16px;font-weight:700;color:#f87171;margin-bottom:8px;">${msg}</div>
      <button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;">🔄 Reintentar</button>
    </div>`;
}

// ── POLLING (reemplaza Realtime) ──────────────────────
// Cada 10s consulta votos y stats sin tocar el DOM de preguntas
function iniciarPolling() {
  if (pollingInt) clearInterval(pollingInt);
  pollingInt = setInterval(async () => {
    if (document.hidden) return; // no consultar si la pestaña no está visible
    await cargarStatsParticipacion();
    actualizarStatsInPlace();
    if (!evData?.ocultar_graficos) {
      Object.keys(portalChartCache).forEach(pregId => actualizarGraficaDesdeCache(pregId));
      // También pedir datos frescos para preguntas con chart
      const pregIds = Object.keys(portalCharts);
      if (pregIds.length) {
        for (const pregId of pregIds) {
          await cargarYActualizarGrafica(pregId);
        }
      }
    }
  }, 10000);
}

// ── CARGAR EVENTO ─────────────────────────────────────
async function cargarEvento() {
  const { data } = await sb.from("eventos")
    .select("id,nombre,estado,tipo,ocultar_graficos,permitir_voto_mora,permitir_cambiar_respuestas,fecha,quorum_minimo")
    .eq("id", EV_ID).single();
  if (!data) { mostrarError("No se encontró el evento."); return; }
  evData = data;
  document.title = data.nombre + " — Portal";
  document.getElementById("nav-ev").textContent = data.nombre;
  await cargarPreguntas();
}

// ── CARGAR UNIDAD INFO ────────────────────────────────
async function cargarUnidadInfo() {
  const { data } = await sb.from("unidades")
    .select("en_mora,coeficiente").eq("id", SS.unidadId).single();
  unidadInfo = data || { en_mora: false, coeficiente: 0 };
}

// ── CARGAR MIS VOTOS ──────────────────────────────────
async function cargarMisVotos() {
  const { data } = await sb.from("votos")
    .select("id_pregunta,respuesta")
    .eq("id_evento", EV_ID)
    .eq("id_unidad", SS.unidadId);
  misVotos = {};
  (data||[]).forEach(v => { misVotos[v.id_pregunta] = v.respuesta; });
}

// ── CARGAR PREGUNTAS ACTIVAS ──────────────────────────
async function cargarPreguntas() {
  const { data } = await sb.from("preguntas")
    .select("*").eq("id_evento", EV_ID).eq("estado", "Activa").order("orden");
  preguntas = data || [];
  await cargarStatsParticipacion();
  renderMain();
}

// ── STATS PARTICIPACIÓN ───────────────────────────────
async function cargarStatsParticipacion() {
  // Solo participantes activos (activo = true)
  const { count: totalPart } = await sb.from("participantes")
    .select("*", { count:"exact", head:true })
    .eq("id_evento", EV_ID)
    .eq("activo", true);

  // Votos únicos por unidad
  const { data: votosUniq } = await sb.from("votos")
    .select("id_unidad,coeficiente")
    .eq("id_evento", EV_ID);

  let coefVotado = 0;
  const unidadesContadas = new Set();
  (votosUniq||[]).forEach(v => {
    if (!unidadesContadas.has(v.id_unidad)) {
      unidadesContadas.add(v.id_unidad);
      coefVotado += parseFloat(String(v.coeficiente||0).replace(",",".")) || 0;
    }
  });

  statsGlobal = {
    totalPart:    totalPart || 0,
    totalVotaron: unidadesContadas.size,
    coefVotado,
  };
}

// ── RENDER PRINCIPAL ──────────────────────────────────
function esDesktop() { return window.innerWidth >= 900; }

function renderMain() {
  const main    = document.getElementById("main");
  const sidebar = document.getElementById("sidebar-content");
  const estadoMap = {
    "Creado":      ["chip-creado","Creado"],
    "En registro": ["chip-registro","En registro"],
    "En curso":    ["chip-curso","En curso"],
    "Cerrado":     ["chip-cerrado","Cerrado"],
  };
  const [chipClass, chipLabel] = estadoMap[evData?.estado] || ["chip-creado","—"];

  // ── SIDEBAR en desktop ──
  if (esDesktop() && sidebar) {
    sidebar.innerHTML = `
      <div style="background:linear-gradient(135deg,rgba(79,5,153,.5),rgba(124,58,237,.3));border:1px solid var(--border);border-radius:20px;padding:20px;">
        <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(196,181,253,.6);margin-bottom:8px;">Evento activo</div>
        <div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:12px;">${evData?.nombre||"—"}</div>
        <div class="estado-chip ${chipClass}" style="display:inline-block;">${chipLabel}</div>
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Tu unidad</div>
          <div style="font-size:20px;font-weight:900;color:#c4b5fd;">${SS.codigo||"—"}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${SS.nombre||""}</div>
        </div>
      </div>
      ${evData?.estado === "En curso" ? `<div id="stats-bar-wrap">${renderStatsBar()}</div>` : ""}
      ${evData?.estado === "En curso" && preguntas.length ? `<div id="progreso-wrap">${renderProgresoPreguntas()}</div>` : ""}
    `;
  }

  // ── MAIN CONTENT ──
  let html = "";

  if (!esDesktop() && evData?.estado === "En curso") {
    html += `<div id="stats-bar-wrap">${renderStatsBar()}</div>`;
  }

  if (evData?.estado === "Creado") {
    html += renderEsperando("📋","Evento no iniciado","El evento aún no ha comenzado. Espera las instrucciones.");
  } else if (evData?.estado === "En registro") {
    html += renderEsperando("📝","Registro en proceso","El registro está abierto. En breve comenzará la votación.");
  } else if (evData?.estado === "Cerrado") {
    html += renderEsperando("🔒","Evento finalizado","La asamblea ha concluido. Gracias por participar.");
  } else if (evData?.estado === "En curso") {
    if (unidadInfo?.en_mora && !evData?.permitir_voto_mora) {
      html += renderMoraBloqueo();
    } else if (!preguntas.length) {
      html += renderEsperando("⏳","Esperando preguntas","El administrador activará las preguntas pronto.");
    } else {
      html += preguntas.map((p,i) => renderPregunta(p, i, misVotos[p.id], Array.isArray(p.opciones)?p.opciones:[])).join("");
    }
  }

  main.innerHTML = html;

  // Cargar gráficas para preguntas ya votadas
  if (!evData?.ocultar_graficos && evData?.estado === "En curso") {
    requestAnimationFrame(() => {
      preguntas.forEach(p => {
        if (misVotos[p.id]) cargarYActualizarGrafica(p.id);
      });
    });
  }
}

function renderEsperando(icon, titulo, sub) {
  return `<div class="esperando"><div class="esp-ring"><div class="esp-icon">${icon}</div></div>
    <div class="esp-titulo">${titulo}</div><div class="esp-sub">${sub}</div></div>`;
}

// ── STATS BAR ─────────────────────────────────────────
function renderStatsBar() {
  const total      = statsGlobal.totalPart || 0;
  const votaron    = statsGlobal.totalVotaron || 0;
  const coefVot    = statsGlobal.coefVotado || 0;
  const quorumMin  = parseFloat(evData?.quorum_minimo || 0);
  const pctNom     = total > 0 ? Math.round(votaron / total * 100) : 0;
  const coefPct    = (coefVot * 100).toFixed(2);
  const quorumAlc  = quorumMin > 0 ? (coefVot / quorumMin * 100) : null;
  const quorumColor = quorumAlc === null ? "#7c3aed" : quorumAlc >= 100 ? "#10b981" : quorumAlc >= 50 ? "#f59e0b" : "#a855f7";
  return `
  <div class="stats-bar" id="stats-bar">
    <div class="stats-title">Participación en tiempo real</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-val" id="sv-votaron">${votaron}<span class="stat-of">/${total}</span></div>
        <div class="stat-lbl">Unidades votando</div>
        <div class="stat-track"><div class="stat-fill" id="sf-nom" style="width:${pctNom}%;background:linear-gradient(90deg,#7c3aed,#c026d3);"></div></div>
        <div class="stat-pct" id="sp-nom">${pctNom}%</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="sv-coef" style="color:${quorumColor};">${coefPct}%</div>
        <div class="stat-lbl">Coeficiente votado</div>
        ${quorumAlc !== null ? `
        <div class="stat-track"><div class="stat-fill" id="sf-quorum" style="width:${Math.min(quorumAlc,100).toFixed(1)}%;background:linear-gradient(90deg,${quorumColor},${quorumColor}88);"></div></div>
        <div class="stat-pct" id="sp-quorum" style="color:${quorumColor};">${quorumAlc.toFixed(1)}% del quórum</div>
        ` : `<div style="height:14px;"></div>`}
      </div>
    </div>
    ${quorumAlc !== null && quorumAlc >= 100 ? `<div class="quorum-badge" id="qbadge">✓ Quórum alcanzado</div>` : `<div id="qbadge"></div>`}
  </div>`;
}

// Actualiza stats IN-PLACE — NO toca el DOM de las preguntas
function actualizarStatsInPlace() {
  const total      = statsGlobal.totalPart || 0;
  const votaron    = statsGlobal.totalVotaron || 0;
  const coefVot    = statsGlobal.coefVotado || 0;
  const quorumMin  = parseFloat(evData?.quorum_minimo || 0);
  const pctNom     = total > 0 ? Math.round(votaron / total * 100) : 0;
  const coefPct    = (coefVot * 100).toFixed(2);
  const quorumAlc  = quorumMin > 0 ? (coefVot / quorumMin * 100) : null;
  const quorumColor = quorumAlc === null ? "#7c3aed" : quorumAlc >= 100 ? "#10b981" : quorumAlc >= 50 ? "#f59e0b" : "#a855f7";

  const setEl = (id, val) => { const e = document.getElementById(id); if(e) e.textContent = val; };
  const setStyle = (id, prop, val) => { const e = document.getElementById(id); if(e) e.style[prop] = val; };

  const svV = document.getElementById("sv-votaron");
  if (svV) svV.innerHTML = `${votaron}<span class="stat-of">/${total}</span>`;
  setStyle("sf-nom", "width", pctNom + "%");
  setEl("sp-nom", pctNom + "%");
  setEl("sv-coef", coefPct + "%");
  setStyle("sv-coef", "color", quorumColor);
  if (quorumAlc !== null) {
    setStyle("sf-quorum", "width", Math.min(quorumAlc,100).toFixed(1) + "%");
    setEl("sp-quorum", quorumAlc.toFixed(1) + "% del quórum");
    setStyle("sp-quorum", "color", quorumColor);
    const badge = document.getElementById("qbadge");
    if (badge) {
      badge.textContent = quorumAlc >= 100 ? "✓ Quórum alcanzado" : "";
      badge.className = quorumAlc >= 100 ? "quorum-badge" : "";
    }
  }

  // Actualizar progreso sidebar
  const progWrap = document.getElementById("progreso-wrap");
  if (progWrap) progWrap.innerHTML = renderProgresoPreguntas();
}

// ── SELECCIONAR OPCIÓN ────────────────────────────────
const selecciones = {};
function seleccionar(pregId, idx, texto) {
  selecciones[pregId] = { idx, texto };
  document.querySelectorAll(`#ops-${pregId} .opcion`).forEach(el => el.classList.remove("selected"));
  document.getElementById(`op-${pregId}-${idx}`)?.classList.add("selected");
  const btn = document.getElementById(`btnv-${pregId}`);
  if (btn) btn.removeAttribute("disabled");
}

// ── VOTAR ─────────────────────────────────────────────
async function votar(pregId) {
  const sel = selecciones[pregId];
  if (!sel) return;

  const btn = document.getElementById(`btnv-${pregId}`);
  if (btn) { btn.disabled = true; btn.innerHTML = `<div class="spin"></div>Enviando…`; }

  const coef = parseFloat(String(unidadInfo?.coeficiente||0).replace(",",".")) || 0;
  const { error } = await sb.from("votos").upsert({
    id_pregunta: pregId, id_evento: EV_ID,
    id_unidad: SS.unidadId, respuesta: sel.texto, coeficiente: coef,
  }, { onConflict: "id_pregunta,id_unidad" });

  if (error) {
    if (btn) { btn.disabled = false; btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Confirmar voto`; }
    toast(error.code==="42501" ? "Sin permisos. Contacta al administrador." : "Error: "+(error.message||"Intenta de nuevo"), "err");
    return;
  }

  const esCambio = !!misVotos[pregId];
  misVotos[pregId] = sel.texto;
  toast(esCambio ? "✓ Respuesta actualizada" : "✓ Voto registrado", "ok");

  // Actualizar DOM quirúrgicamente — SIN outerHTML del card
  _actualizarCardTrasVoto(pregId, sel.texto);

  // Stats en segundo plano
  cargarStatsParticipacion().then(() => actualizarStatsInPlace());

  // Gráfica
  if (!evData?.ocultar_graficos) {
    delete portalCharts[pregId];
    delete portalChartCache[pregId];
    setTimeout(() => cargarYActualizarGrafica(pregId), 80);
  }
}

// Actualización quirúrgica del card tras votar — NO usa outerHTML
function _actualizarCardTrasVoto(pregId, texto) {
  const puedeEditar = evData?.permitir_cambiar_respuestas;

  // Actualizar badge de voto
  const badge = document.getElementById(`vbadge-${pregId}`);
  const vtexto = document.getElementById(`vtexto-${pregId}`);
  if (vtexto) {
    vtexto.textContent = texto;
  } else if (!badge) {
    // Crear badge por primera vez (primera votación)
    const body = document.getElementById(`preg-body-${pregId}`);
    if (body) {
      const badgeDiv = document.createElement("div");
      badgeDiv.className = puedeEditar ? "votado-badge" : "votado-badge";
      badgeDiv.id = `vbadge-${pregId}`;
      badgeDiv.style.cssText = puedeEditar ? "background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d;" : "";
      badgeDiv.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${puedeEditar?"Votaste:":"Tu voto:"} <strong id="vtexto-${pregId}">${texto}</strong>${puedeEditar?' — <span style="opacity:.7;font-size:12px;">puedes cambiar</span>':""}`;
      body.insertBefore(badgeDiv, body.firstChild);
    }
  } else {
    // Badge existe pero sin vtexto — actualizarlo entero
    if (puedeEditar) {
      badge.style.cssText = "background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d;";
      badge.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Votaste: <strong id="vtexto-${pregId}">${texto}</strong> — <span style="opacity:.7;font-size:12px;">puedes cambiar</span>`;
    }
  }

  // Si no puede editar: ocultar opciones y botón después de votar
  if (!puedeEditar) {
    const ops = document.getElementById(`ops-${pregId}`);
    const btn = document.getElementById(`btnv-${pregId}`);
    if (ops) ops.style.display = "none";
    if (btn) btn.style.display = "none";
  } else {
    // Puede editar: restaurar botón y deseleccionar opciones
    const btn = document.getElementById(`btnv-${pregId}`);
    if (btn) {
      btn.disabled = true; // deshabilitar hasta nueva selección
      btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Cambiar respuesta`;
    }
    // Marcar opción actual como selected
    document.querySelectorAll(`#ops-${pregId} .opcion`).forEach(el => el.classList.remove("selected"));
    const preg = preguntas.find(p => String(p.id) === String(pregId));
    const opciones = Array.isArray(preg?.opciones) ? preg.opciones : [];
    opciones.forEach((op, i) => {
      const t = typeof op === "object" ? op.texto : op;
      if (t === texto) document.getElementById(`op-${pregId}-${i}`)?.classList.add("selected");
    });
    delete selecciones[pregId]; // limpiar selección pendiente
  }

  // Actualizar progreso sidebar
  const progWrap = document.getElementById("progreso-wrap");
  if (progWrap) progWrap.innerHTML = renderProgresoPreguntas();

  // Asegurarse que el div de resultado existe
  if (!evData?.ocultar_graficos) {
    let resEl = document.getElementById(`res-${pregId}`);
    if (!resEl) {
      const body = document.getElementById(`preg-body-${pregId}`);
      if (body) {
        resEl = document.createElement("div");
        resEl.id = `res-${pregId}`;
        resEl.style.marginTop = "12px";
        body.appendChild(resEl);
      }
    }
  }
}

// ─── PORTAL CHARTS ─────────────────────────────────────
const PORTAL_COLORS = [
  { bg:"rgba(168,85,247,.85)", border:"#a855f7" },
  { bg:"rgba(34,211,238,.85)", border:"#22d3ee" },
  { bg:"rgba(251,146,60,.85)", border:"#fb923c" },
  { bg:"rgba(74,222,128,.85)", border:"#4ade80" },
  { bg:"rgba(248,113,113,.85)",border:"#f87171" },
  { bg:"rgba(250,204,21,.85)", border:"#facc15" },
];

// { pregId: Chart instance }
const portalCharts = {};
// { pregId: { resData, totalVotos, quorumMin } }
const portalChartCache = {};
// { pregId: "coef"|"quorum"|"nominal" } — métrica activa
const chartMetrica = {};

// ── CARGAR Y ACTUALIZAR GRÁFICA ───────────────────────
async function cargarYActualizarGrafica(pregId) {
  if (evData?.ocultar_graficos) return;

  const { data: votos } = await sb.from("votos")
    .select("respuesta,coeficiente,id_unidad")
    .eq("id_pregunta", pregId);

  if (!votos) return;

  const preg     = preguntas.find(p => String(p.id) === String(pregId));
  const opciones = Array.isArray(preg?.opciones) ? preg.opciones : [];
  const miVoto   = misVotos[pregId];
  const quorumMin = parseFloat(evData?.quorum_minimo || 0);

  // Calcular por opción
  const totCoef = {}, totNom = {}, totUniq = new Set();
  opciones.forEach(op => { const t = typeof op==="object"?op.texto:op; totCoef[t]=0; totNom[t]=0; });
  votos.forEach(v => {
    const r = v.respuesta;
    if (!totCoef[r]) { totCoef[r]=0; totNom[r]=0; }
    totCoef[r] += parseFloat(String(v.coeficiente||0).replace(",",".")) || 0;
    totNom[r]  += 1;
    totUniq.add(v.id_unidad);
  });
  const sumCoef = Object.values(totCoef).reduce((a,b)=>a+b, 0);

  const resData = opciones.map((op, i) => {
    const texto = typeof op==="object" ? op.texto : op;
    const coef  = totCoef[texto] || 0;
    const nom   = totNom[texto]  || 0;
    return {
      texto, idx: i,
      coefPct:   sumCoef > 0 ? (coef/sumCoef)*100 : 0,
      quorumPct: quorumMin > 0 ? (coef/quorumMin)*100 : 0,
      nominal:   nom,
    };
  });

  portalChartCache[pregId] = { resData, totalVotos: votos.length, miVoto, quorumMin };

  const resEl = document.getElementById(`res-${pregId}`);
  if (!resEl) return;

  const chartExists = !!portalCharts[pregId];

  if (!chartExists) {
    // Primera vez: construir HTML
    resEl.innerHTML = buildChartCard(pregId, resData, miVoto, votos.length, quorumMin);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        dibujarChart(pregId, resData, miVoto);
      });
    });
  } else {
    // Ya existe: actualizar solo datos
    actualizarGraficaDesdeCache(pregId);
  }
}

function actualizarGraficaDesdeCache(pregId) {
  const cache = portalChartCache[pregId];
  if (!cache || !portalCharts[pregId]) return;
  const { resData, totalVotos, miVoto } = cache;
  const metrica = chartMetrica[pregId] || "coef";

  // Actualizar chart data
  const chart = portalCharts[pregId];
  chart.data.datasets[0].data = resData.map(r => getMetricVal(r, metrica));
  chart.update("none"); // sin animación para velocidad

  // Actualizar contador
  const cntEl = document.getElementById(`res-cnt-${pregId}`);
  if (cntEl) cntEl.textContent = `${totalVotos} voto${totalVotos!==1?"s":""}`;

  // Actualizar tabla CSS
  resData.forEach((r, i) => {
    const val = getMetricVal(r, metrica);
    const maxVal = Math.max(...resData.map(x => getMetricVal(x, metrica)));
    const pctAncho = maxVal > 0 ? (val/maxVal)*100 : 0;
    const el_bar = document.getElementById(`rbar-${pregId}-${i}`);
    const el_val = document.getElementById(`rval-${pregId}-${i}`);
    const el_nom = document.getElementById(`rnom-${pregId}-${i}`);
    if (el_bar) el_bar.style.width = pctAncho + "%";
    if (el_val) el_val.textContent = formatMetricVal(r, metrica);
    if (el_nom) el_nom.textContent = r.nominal + " unid.";
  });
}

function getMetricVal(r, metrica) {
  if (metrica === "quorum") return +r.quorumPct.toFixed(2);
  if (metrica === "nominal") return r.nominal;
  return +r.coefPct.toFixed(2);
}

function formatMetricVal(r, metrica) {
  if (metrica === "quorum")  return r.quorumPct.toFixed(1) + "% quórum";
  if (metrica === "nominal") return r.nominal + " unid.";
  return r.coefPct.toFixed(1) + "%";
}

// ── CONSTRUIR HTML DEL CARD ───────────────────────────
function buildChartCard(pregId, resData, miVoto, totalVotos, quorumMin) {
  const isMobile = window.innerWidth < 600;
  const metrica  = chartMetrica[pregId] || "coef";

  const btnStyle = (m) => metrica===m
    ? "padding:5px 10px;border-radius:20px;border:1.5px solid rgba(168,85,247,.6);background:rgba(168,85,247,.2);color:#c4b5fd;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;"
    : "padding:5px 10px;border-radius:20px;border:1.5px solid rgba(255,255,255,.12);background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;";

  return `
  <div class="resultado-card" id="rescard-${pregId}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);">📊 <span id="res-cnt-${pregId}">${totalVotos} voto${totalVotos!==1?"s":""}</span></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        <button style="${btnStyle('coef')}" id="mbtn-coef-${pregId}" onclick="cambiarMetrica('${pregId}','coef')">Coef.</button>
        ${quorumMin > 0 ? `<button style="${btnStyle('quorum')}" id="mbtn-quorum-${pregId}" onclick="cambiarMetrica('${pregId}','quorum')">Quórum</button>` : ""}
        <button style="${btnStyle('nominal')}" id="mbtn-nominal-${pregId}" onclick="cambiarMetrica('${pregId}','nominal')">Nominal</button>
      </div>
    </div>
    <!-- Canvas chart -->
    <div style="position:relative;height:${isMobile ? Math.max(resData.length*38+20,130)+'px' : '220px'};" id="chwrap-${pregId}">
      <canvas id="chart-${pregId}"></canvas>
    </div>
    <!-- Tabla debajo -->
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:6px;" id="chartabla-${pregId}">
      ${buildTablaRows(pregId, resData, miVoto, metrica)}
    </div>
  </div>`;
}

function buildTablaRows(pregId, resData, miVoto, metrica) {
  return resData.map((r, i) => {
    const esMio  = r.texto === miVoto;
    const color  = PORTAL_COLORS[i%PORTAL_COLORS.length].border;
    const val    = formatMetricVal(r, metrica);
    const maxVal = Math.max(...resData.map(x => getMetricVal(x, metrica)));
    const pctAncho = maxVal > 0 ? (getMetricVal(r, metrica)/maxVal)*100 : 0;
    return `<div style="display:flex;align-items:center;gap:8px;">
      <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
          <span style="font-size:11px;font-weight:${esMio?800:600};color:${esMio?'#4ade80':'#c4b5fd'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52%;">${r.texto}${esMio?' ✓':''}</span>
          <div style="display:flex;gap:6px;align-items:center;white-space:nowrap;">
            <span id="rval-${pregId}-${i}" style="font-size:11px;font-weight:800;color:#fff;">${val}</span>
            <span id="rnom-${pregId}-${i}" style="font-size:10px;color:var(--muted);">${r.nominal} unid.</span>
          </div>
        </div>
        <div style="height:5px;background:rgba(255,255,255,.07);border-radius:20px;overflow:hidden;">
          <div id="rbar-${pregId}-${i}" style="height:100%;border-radius:20px;background:${esMio?'linear-gradient(90deg,#4ade80,#22d3ee)':color};width:${pctAncho}%;transition:width .6s ease;"></div>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── DIBUJAR CHART (primera vez) ───────────────────────
function dibujarChart(pregId, resData, miVoto) {
  const canvas = document.getElementById(`chart-${pregId}`);
  if (!canvas) return;
  if (portalCharts[pregId]) { portalCharts[pregId].destroy(); }

  const metrica  = chartMetrica[pregId] || "coef";
  const isMobile = window.innerWidth < 600;
  const labels   = resData.map(r => r.texto.length > (isMobile?10:14) ? r.texto.slice(0,isMobile?9:13)+"…" : r.texto);
  const vals     = resData.map(r => getMetricVal(r, metrica));
  const bgColors = resData.map((_,i) => PORTAL_COLORS[i%PORTAL_COLORS.length].bg);
  const brColors = resData.map((_,i) => PORTAL_COLORS[i%PORTAL_COLORS.length].border);

  portalCharts[pregId] = new Chart(canvas, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: vals,
        backgroundColor: bgColors,
        borderColor: brColors,
        borderWidth: 2,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: isMobile ? "y" : "x",
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 350 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "rgba(10,5,25,.95)",
          titleColor:"#fff", bodyColor:"#c4b5fd",
          borderColor:"rgba(168,85,247,.4)", borderWidth:1, padding:10,
          callbacks: {
            title: items => resData[items[0].dataIndex]?.texto || "",
            label: c => {
              const r = resData[c.dataIndex];
              const m = chartMetrica[pregId] || "coef";
              return ` ${formatMetricVal(r, m)} · ${r.nominal} unid.`;
            }
          }
        }
      },
      scales: {
        [isMobile ? "x" : "y"]: {
          beginAtZero: true,
          grid: { color:"rgba(255,255,255,.05)", drawBorder:false },
          ticks: { color:"rgba(196,181,253,.6)", font:{size:9},
            callback: v => {
              const m = chartMetrica[pregId] || "coef";
              return m==="nominal" ? v : v+"%";
            }
          }
        },
        [isMobile ? "y" : "x"]: {
          grid: { display: false },
          ticks: { color:"#c4b5fd", font:{ size:9, weight:"600" }, maxRotation: isMobile?0:20 }
        }
      }
    }
  });
}

// ── CAMBIAR MÉTRICA ───────────────────────────────────
function cambiarMetrica(pregId, metrica) {
  chartMetrica[pregId] = metrica;
  const cache = portalChartCache[pregId];
  if (!cache) return;

  // Actualizar estilos de botones
  ["coef","quorum","nominal"].forEach(m => {
    const btn = document.getElementById(`mbtn-${m}-${pregId}`);
    if (!btn) return;
    btn.style.background = m===metrica ? "rgba(168,85,247,.2)" : "transparent";
    btn.style.borderColor = m===metrica ? "rgba(168,85,247,.6)" : "rgba(255,255,255,.12)";
    btn.style.color = m===metrica ? "#c4b5fd" : "var(--muted)";
  });

  // Actualizar datos del chart
  const chart = portalCharts[pregId];
  if (chart) {
    chart.data.datasets[0].data = cache.resData.map(r => getMetricVal(r, metrica));
    chart.options.scales[window.innerWidth<600?"x":"y"].ticks.callback =
      v => metrica==="nominal" ? v : v+"%";
    chart.update();
  }

  // Actualizar tabla
  const tablaEl = document.getElementById(`chartabla-${pregId}`);
  if (tablaEl) tablaEl.innerHTML = buildTablaRows(pregId, cache.resData, cache.miVoto, metrica);
}

// ── TOAST ─────────────────────────────────────────────
let _tt;
function toast(msg, tipo="ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = tipo==="err"?"#dc2626":tipo==="warn"?"#b45309":"#4f0599";
  t.className = "show";
  clearTimeout(_tt);
  _tt = setTimeout(()=>t.className="", 3500);
}

// Re-render on resize
let _resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => { if (evData) renderMain(); }, 300);
});

// Detener polling cuando la página pierde foco
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && pollingInt) {
    // Actualizar inmediatamente al volver
    cargarStatsParticipacion().then(() => {
      actualizarStatsInPlace();
      if (!evData?.ocultar_graficos) {
        Object.keys(portalCharts).forEach(pregId => cargarYActualizarGrafica(pregId));
      }
    });
  }
});

init();

</script>
