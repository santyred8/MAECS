// ── Panel flotante mobile ─────────────────────────────────────────────
let _mobilePregActual = null;
let _mobileOpcionSel  = null;

function mostrarFabMobile() {
  if (window.innerWidth >= 900) return;
  const fab = document.getElementById("mobile-vote-fab");
  if (!fab) return;
  // Mostrar si hay preguntas activas O cerradas (para ver resultados)
  const hayAlgo = preguntas.length > 0 || preguntasCerradas.length > 0;
  fab.style.display = hayAlgo ? "flex" : "none";
}

function abrirMobilePanel() {
  const sinVotar = preguntas.find(p => !misVotos[p.id]);
  const target   = sinVotar || preguntas[0] || preguntasCerradas[preguntasCerradas.length - 1];
  if (!target) return;
  renderMobilePanel(target);
  document.getElementById("mobile-vote-panel").classList.add("visible");
  document.getElementById("mobile-vote-fab").style.display = "none";
}

function cerrarMobilePanel() {
  document.getElementById("mobile-vote-panel").classList.remove("visible");
  // En zoom-mobile-mode el FAB siempre visible si hay preguntas activas
  setTimeout(() => {
    const fab = document.getElementById("mobile-vote-fab");
    if (!fab) return;
    const hayPreguntas = preguntas.length > 0;
    if (hayPreguntas) fab.style.display = "flex";
  }, 350);
}

function renderMobilePanel(preg) {
  _mobilePregActual = preg;
  _mobileOpcionSel  = misVotos[preg.id] || null;
  const opciones     = Array.isArray(preg.opciones) ? preg.opciones : [];
  const letras       = "ABCDEFGHIJKLMN";
  const esCerrada    = preg.estado === "Cerrada" || !!preguntasCerradas.find(c => c.id === preg.id);
  const yaVoto       = !!misVotos[preg.id];
  const puedeCambiar = yaVoto && !!evData?.permitir_cambiar_respuestas && !esCerrada;
  const mostrarOpciones = (!yaVoto || puedeCambiar) && !esCerrada;

  let opcionesHtml = mostrarOpciones ? opciones.map((op, i) => {
    const sel = _mobileOpcionSel === op ? "selected" : "";
    return `<div class="mvp-opcion ${sel}" onclick="selMobileOpcion(this,'${op.replace(/'/g,"\\'")}')">
      <div class="mvp-op-radio"><div class="mvp-op-check"></div></div>
      <div class="mvp-op-letra">${letras[i]}</div>
      <div class="mvp-op-text">${op}</div>
    </div>`;
  }).join("") : "";

  let estadoBadge = esCerrada
    ? `<div style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);font-size:10px;font-weight:700;color:#f87171;margin-bottom:10px;">🔒 Cerrada</div>`
    : "";

  let votadoHtml = "";
  if (yaVoto) {
    votadoHtml = `<div class="mvp-votado">
      ✓ Tu voto: <strong>${misVotos[preg.id]}</strong>
      ${puedeCambiar ? '<span style="font-size:10px;opacity:.7;margin-left:6px;">puedes cambiar</span>' : ""}
    </div>`;
  } else if (esCerrada) {
    votadoHtml = `<div style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.05);font-size:12px;color:var(--muted);margin-bottom:10px;">Sin voto registrado</div>`;
  }

  // Navegación entre todas (activas + cerradas)
  const todas = [...preguntas, ...preguntasCerradas];
  const idx = todas.findIndex(p => p.id === preg.id);
  let navHtml = "";
  if (todas.length > 1) {
    navHtml = `<div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
      ${idx > 0 ? `<button onclick="navMobilePreg(-1)" style="flex:1;padding:8px;border-radius:10px;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;">← Ant</button>` : ""}
      <span style="flex-shrink:0;font-size:11px;color:var(--muted);align-self:center;">${idx+1}/${todas.length}</span>
      ${idx < todas.length-1 ? `<button onclick="navMobilePreg(1)" style="flex:1;padding:8px;border-radius:10px;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;">Sig →</button>` : ""}
    </div>`;
  }

  const mostrarBtn = (!yaVoto || puedeCambiar) && !esCerrada;
  const btnLabel   = yaVoto ? "Cambiar respuesta" : "Confirmar voto";
  const resHtml    = yaVoto ? renderMobileResultados(preg.id, opciones) : "";

  document.getElementById("mvp-body").innerHTML = `
    <div class="mvp-titulo">${preg.titulo || "Pregunta"}</div>
    ${estadoBadge}
    ${votadoHtml}
    ${mostrarOpciones ? `<div class="mvp-opciones" id="mvp-opciones">${opcionesHtml}</div>` : ""}
    ${mostrarBtn ? `<button class="mvp-btn-votar" id="mvp-btn-votar" onclick="votarMobile()" ${!_mobileOpcionSel?"disabled":""}>
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      ${btnLabel}
    </button>` : ""}
    ${resHtml}
    ${navHtml}`;
}

function renderMobileResultados(pregId, opciones) {
  // Usar datos del cache de gráficas si existen
  const cache = portalChartCache[pregId];
  if (!cache || !cache.labels) return "";
  const total = cache.data.reduce((a,b) => a+b, 0);
  if (total === 0) return "";
  const miVoto = misVotos[pregId];
  const colores = ["#a855f7","#ec4899","#3b82f6","#10b981","#f59e0b","#ef4444"];
  const filas = cache.labels.map((lbl, i) => {
    const pct = total > 0 ? Math.round(cache.data[i] / total * 100) : 0;
    const esMio = lbl === miVoto;
    return `<div class="mvp-res-fila">
      <div class="mvp-res-label ${esMio?"mio":""}">${lbl}</div>
      <div class="mvp-res-track"><div class="mvp-res-fill" style="width:${pct}%;background:${esMio?'#4ade80':colores[i%colores.length]};"></div></div>
      <div class="mvp-res-pct">${pct}%</div>
    </div>`;
  }).join("");
  return `<div class="mvp-res"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Resultados</div>${filas}</div>`;
}

function selMobileOpcion(el, opcion) {
  document.querySelectorAll(".mvp-opcion").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");

  const btn = document.getElementById("mvp-btn-votar");
  if (btn) btn.disabled = false;
}

async function votarMobile() {
  if (!_mobileOpcionSel || !_mobilePregActual) return;
  const btn = document.getElementById("mvp-btn-votar");
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spin"></div> Votando…'; }

  const pregId = _mobilePregActual.id;
  const coef   = parseFloat(String(unidadInfo?.coeficiente||0).replace(",",".")) || 0;

  // Insertar voto propio
  const { error } = await sb.from("votos").upsert({
    id_pregunta: pregId, id_evento: EV_ID,
    id_unidad: SS.unidadId, respuesta: _mobileOpcionSel, coeficiente: coef,
  }, { onConflict: "id_pregunta,id_unidad" });

  if (error) {
    toast("Error al votar: " + (error.message||"Intenta de nuevo"), "err");
    if (btn) { btn.disabled = false; btn.innerHTML = '✓ Confirmar voto'; }
    return;
  }

  // Delegantes en paralelo
  const { data: delegantes } = await sb.from("delegaciones")
    .select("id_unidad_entrega")
    .eq("id_evento", EV_ID)
    .eq("id_unidad_recibe", SS.unidadId);

  if (delegantes?.length > 0) {
    const idsDel = delegantes.map(d => d.id_unidad_entrega).filter(Boolean);
    const { data: uDels } = await sb.from("unidades").select("id,coeficiente").in("id", idsDel);
    const coefMap = {};
    (uDels||[]).forEach(u => { coefMap[u.id] = parseFloat(String(u.coeficiente||0).replace(",",".")) || 0; });
    await Promise.all(idsDel.map(id =>
      sb.from("votos").upsert({
        id_pregunta: pregId, id_evento: EV_ID,
        id_unidad: id, respuesta: _mobileOpcionSel, coeficiente: coefMap[id]||0,
      }, { onConflict: "id_pregunta,id_unidad" })
    ));
  }

  misVotos[pregId] = _mobileOpcionSel;
  toast("✓ Voto registrado", "ok");

  // Forzar refresh de gráfica en próximo poll (mismo fix que PC)
  delete _votosCountCache[pregId];

  // Re-render panel con resultado
  setTimeout(() => { if (_mobilePregActual) renderMobilePanel(_mobilePregActual); }, 200);
  // Actualizar stats
  cargarStatsParticipacion().then(() => actualizarStatsInPlace());
}

function navMobilePreg(dir) {
  const todas = [...preguntas, ...preguntasCerradas];
  const idx   = todas.findIndex(p => p.id === _mobilePregActual?.id);
  const nueva = todas[idx + dir];
  if (nueva) renderMobilePanel(nueva);

// ── Resize VERTICAL suave (altura zoom) ──────────────────────────────
function iniciarResize(e) {
  e.preventDefault();
  const startY = e.clientY, startH = _zoomH;
  const wrapper = document.getElementById("zoom-container-wrapper");
  let raf = null;

  function onMove(ev) {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      const newH = Math.max(180, Math.min(window.innerHeight * 0.9, startH + (ev.clientY - startY)));
      _zoomH = newH;
      _zoomResizadoManual = true;
      wrapper.style.height = newH + "px";
      document.documentElement.style.setProperty("--zoom-h", newH + "px");
    });
  }
  function onUp() {
    if (raf) cancelAnimationFrame(raf);
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onUp);
    document.body.style.userSelect = "";
  }
  document.body.style.userSelect = "none";
  document.addEventListener("mousemove", onMove);
  document.addEventListener("mouseup", onUp);
}

// ── Resize HORIZONTAL suave (ancho columna) ───────────────────────────
function iniciarResizeCol(e) {
  e.preventDefault();
  const startX = e.clientX, startW = _zoomColW;
  const handle = document.getElementById("zoom-col-handle");
  if (handle) handle.classList.add("dragging");
  let raf = null;

  function onMove(ev) {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      const newW = Math.max(280, Math.min(window.innerWidth * 0.75, startW + (ev.clientX - startX)));
      _zoomColW = newW;
      _zoomResizadoManual = true;
      document.documentElement.style.setProperty("--zoom-col-w", newW + "px");
      const btnC = document.getElementById("btn-cerrar-panel");
      if (btnC) btnC.style.left = (newW - 1) + "px";
    });
  }
  function onUp() {
    if (raf) cancelAnimationFrame(raf);
    if (handle) handle.classList.remove("dragging");
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onUp);
    document.body.style.userSelect = "";
  }
  document.body.style.userSelect = "none";
  document.addEventListener("mousemove", onMove);
  document.addEventListener("mouseup", onUp);
}

      renderMobilePanel(sinVotar);
      document.getElementById("mobile-vote-panel").classList.add("visible");
      document.getElementById("mobile-vote-fab").style.display = "none";
    }
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    return;
  }

  // Mobile sin zoom: mostrar FAB
  if (window.innerWidth < 900) {
    mostrarFabMobile();
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    return;
  }

  // Desktop: notificación banner arriba
  const notif = document.getElementById("notif-nueva-preg");
  if (!notif) return;
  notif.style.display = "flex";
  if (_notifTimer) clearTimeout(_notifTimer);
  _notifTimer = setTimeout(() => { notif.style.display = "none"; }, 6000);
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

function scrollAlPrimer() {
  document.getElementById("notif-nueva-preg").style.display = "none";
  const primera = document.querySelector(".pregunta-card");
  if (primera) primera.scrollIntoView({ behavior:"smooth", block:"center" });
}

</script>
</body>
</html>
